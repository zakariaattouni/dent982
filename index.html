<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadAid - مستقر</title>
<style>
  body { background: #0f172a; color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
  h2 { color: #38bdf8; margin-bottom: 15px; }
  textarea { width: 100%; height: 100px; background: #1e293b; color: #fff; border: none; padding: 12px; font-size: 16px; border-radius: 8px; resize: none; margin-bottom: 10px; }
  .btn { display: block; width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; color: #fff; transition: opacity 0.2s; }
  .btn:active { opacity: 0.8; }
  .btn-start { background: #10b981; }
  .btn-stop { background: #ef4444; display: none; }
  #log { text-align: left; font-family: monospace; font-size: 11px; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; height: 100px; overflow-y: auto; white-space: pre-wrap; direction: ltr; margin-top: 15px; }
  .line { padding: 15px; background: #1e293b; margin: 8px 0; border-radius: 8px; font-size: 22px; border-right: 4px solid #334155; }
  .line.active { background: #1e3a8a; border-right-color: #60a5fa; transform: scale(1.02); }
</style>
</head>
<body>

<h2>ReadAid - قراءة مستقرة</h2>

<textarea id="input" placeholder="النص سيظهر هنا عند المشاركة..."></textarea>

<button class="btn btn-start" id="startBtn">🔊 اضغط هنا لبدء القراءة</button>
<button class="btn btn-stop" id="stopBtn">⏹️ إيقاف</button>

<div id="linesContainer"></div>
<div id="log">بانتظار النص أو الضغطة...</div>

<script>
  let isReading = false;
  let sentences = [];
  let currentIndex = 0;
  let voicesReady = false;

  function log(msg) {
    const el = document.getElementById('log');
    el.textContent = msg + '\n' + el.textContent;
  }

  // تنظيف صارم وسريع
  function clean(text) {
    if (!text) return '';
    // يحذف كل شيء ما عدا العربي، الأرقام، المسافات، وعلامات الترقيم الأساسية
    let t = text.replace(/[^\u0600-\u06FF0-9\s\.\,\!\?\:\;\-\(\)؟،؛]/g, '');
    return t.replace(/\s+/g, ' ').trim();
  }
  function prepareUI() {
    const raw = document.getElementById('input').value;
    if (!raw.trim()) { log('⚠️ النص فارغ'); return false; }
    
    const text = clean(raw);
    log('🧼 نص نظيف: ' + text.substring(0, 40) + '...');
    
    sentences = text.split(/[\n\.!؟]+/).map(s => s.trim()).filter(s => s.length > 2);
    const container = document.getElementById('linesContainer');
    container.innerHTML = '';
    
    sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.id = 'l' + i;
      div.textContent = s;
      container.appendChild(div);
    });
    
    log('✅ تم تجهيز ' + sentences.length + ' أسطر');
    return sentences.length > 0;
  }

  function speakNext() {
    if (!isReading || currentIndex >= sentences.length) {
      stop();
      return;
    }

    // تحديث الواجهة
    document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
    const currentEl = document.getElementById('l' + currentIndex);
    if (currentEl) {
      currentEl.classList.add('active');
      currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    const text = sentences[currentIndex];
    log('🗣️ يقرأ: ' + text.substring(0, 30) + '...');

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ar-SA';
    utter.rate = 0.85;

    // اختيار صوت عربي إن وجد
    const voices = speechSynthesis.getVoices();
    const arVoice = voices.find(v => v.lang.startsWith('ar'));
    if (arVoice) utter.voice = arVoice;

    utter.onend = () => {      if (isReading) { currentIndex++; speakNext(); }
    };

    utter.onerror = (e) => {
      log('❌ خطأ في السطر: ' + e.error);
      // تخطي السطر المعطل والمتابعة فوراً
      currentIndex++;
      setTimeout(speakNext, 200);
    };

    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }

  function start() {
    if (!prepareUI()) return;
    
    isReading = true;
    currentIndex = 0;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    log('🟢 بدأت القراءة...');
    
    // تأخير بسيط لضمان جاهزية المحرك
    setTimeout(speakNext, 300);
  }

  function stop() {
    isReading = false;
    speechSynthesis.cancel();
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
    log('⏹️ تم الإيقاف');
  }

  // التهيئة عند تحميل الصفحة
  document.addEventListener('DOMContentLoaded', () => {
    // 1. استقبال النص من المشاركة
    const params = new URLSearchParams(location.search);
    let shared = params.get('text') || params.get('share') || params.get('title') || '';
    if (shared) {
      try { shared = decodeURIComponent(shared.replace(/\+/g, ' ')); } catch(e){}
      document.getElementById('input').value = shared;
      log('📥 تم استقبال النص من المشاركة');
      prepareUI();
    }

    // 2. تحميل الأصوات مسبقاً
    if (window.speechSynthesis) {      const loadVoices = () => { voicesReady = true; log('🔊 الأصوات جاهزة'); };
      window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
      window.speechSynthesis.getVoices();
    }

    // 3. ربط الأزرار
    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('stopBtn').addEventListener('click', stop);
  });
</script>

</body>
</html>
