<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadAid Smart Engine</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1218;
color:#fff;
height:100vh;
overflow:hidden;
}

header{
padding:14px;
text-align:center;
background:#111827;
font-weight:800;
}

textarea{
width:100%;
height:130px;
padding:12px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

#out{
height:calc(100vh - 280px);
overflow-y:auto;
padding:15px;
font-size:30px;
line-height:2.4;
font-weight:700;
}

.line{
padding:14px;
margin-bottom:10px;
background:#1b2430;
border-radius:12px;
}

.active{
background:#1565c0;
}

button{
width:100%;
padding:14px;
border:none;
background:#1e88e5;
color:#fff;
font-size:18px;
font-weight:800;
}
</style>
</head>

<body>

<header>ReadAid Smart Engine</header>

<textarea id="input" placeholder="الصق أي نص من أي مكان..."></textarea>

<button onclick="build()">تحويل إلى قراءة نظيفة</button>
<button onclick="read()">تشغيل القراءة</button>

<div id="out"></div>

<script>

let index = 0;
let reading = false;

/* 🔥 قلب النظام: إعادة بناء النص */
function build(){

const raw = document.getElementById("input").value;

const tokens = raw
// إزالة الروابط
.replace(/https?:\/\/\S+/g,'')
// إزالة الإيموجي
.replace(/[\p{Extended_Pictographic}]/gu,'')
// إزالة رموز التحكم المخفية
.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g,'')
// تحويل علامات الفوضى إلى فراغ
.replace(/[^\p{L}\p{N}\u0600-\u06FF\s]/gu,' ')
.split(/\s+/)
.filter(t => {
if(!t) return false;

// فقط كلمات قابلة للنطق
return /^[\p{L}\p{N}\u0600-\u06FF]+$/u.test(t);
});

// إعادة تشكيل الجمل (كل 10 كلمات تقريبًا)
let rebuilt = [];
for(let i=0;i<tokens.length;i+=10){
rebuilt.push(tokens.slice(i,i+10).join(' '));
}

const out = document.getElementById("out");
out.innerHTML = "";

rebuilt.forEach((r,i)=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = r;
out.appendChild(div);
});
}

/* 🔥 القراءة */
function read(){

if(reading){
speechSynthesis.cancel();
reading=false;
index=0;
return;
}

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading=true;
index=0;

function speak(){

if(!reading) return;

if(index>=lines.length){
reading=false;
return;
}

lines.forEach(l=>l.classList.remove("active"));
lines[index].classList.add("active");

lines[index].scrollIntoView({behavior:"smooth",block:"center"});

const text = lines[index].innerText;

const u = new SpeechSynthesisUtterance(text);
u.lang="ar-SA";
u.rate=0.85;
u.pitch=1;

u.onend=()=>{
index++;
speak();
};

speechSynthesis.cancel();
speechSynthesis.speak(u);
}

speak();
}

</script>

</body>
</html>
