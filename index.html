<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadAid - Ultimate Fix</title>
<style>
    body { background: #0f172a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; }
    .box { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
    textarea { width: 100%; height: 100px; background: #0f172a; color: #fff; border: none; padding: 10px; font-size: 18px; border-radius: 8px; resize: none; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
    .btn-green { background: #10b981; }
    .btn-red { background: #ef4444; }
    .btn-blue { background: #3b82f6; }
    #visual-log { text-align: left; font-family: monospace; font-size: 12px; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; white-space: pre-wrap; direction: ltr; }
    .line-item { padding: 15px; background: #1e293b; margin: 10px 0; border-radius: 8px; font-size: 22px; border-right: 5px solid #334155; }
    .line-active { background: #334155; border-right-color: #38bdf8; transform: scale(1.02); }
</style>
</head>
<body>

    <h1>ReadAid - وضع الإنقاذ</h1>

    <div class="box">
        <textarea id="input" placeholder="النص سيظهر هنا عند المشاركة..."></textarea>
    </div>

    <button class="btn-green" onclick="startReading()">🔊 بدء القراءة الآمنة</button>
    <button class="btn-red" onclick="stopReading()" style="margin-top:10px;">⏹️ إيقاف</button>
    
    <div id="output-area"></div>

    <div class="box" style="margin-top:20px;">
        <div style="color:#64748b; margin-bottom:5px;">👁️ سجل المعالجة (ما يراه التطبيق):</div>
        <div id="visual-log">بانتظار النص...</div>
    </div>

<script>
    let isReading = false;
    let lines = [];
    let currentLineIndex = 0;

    // دالة التنظيف النووية
    function nuclearClean(text) {
        if (!text) return "";
        // 1. إزالة أي كود URL متبقي
        text = text.replace(/%[A-F0-9]{2}/gi, '');
        // 2. إزالة كل شيء ليس حرف عربي أو رقم أو علامة ترقيم بسيطة
        // هذا يزيل الإيموجي، الروابط، الرموز الخاصة، والمسافات الغريبة        let cleaned = text.replace(/[^\u0600-\u06FF0-9\s\.\,\!\?\:\;\-\(\)]/g, '');
        // 3. إزالة المسافات الزائدة
        return cleaned.replace(/\s+/g, ' ').trim();
    }

    // استقبال النص من المشاركة
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        // نجرب عدة احتمالات لاسم الباراميتر
        let rawText = urlParams.get('text') || urlParams.get('share') || urlParams.get('title') || "";
        
        if (rawText) {
            // فك التشفير
            try { rawText = decodeURIComponent(rawText); } catch(e){}
            // أحياناً يكون مشفراً مرتين
            try { rawText = decodeURIComponent(rawText); } catch(e){}
            
            // تنظيف فوري
            const cleanText = nuclearClean(rawText);
            
            document.getElementById('input').value = cleanText;
            log("📥 نص مستلم: " + rawText.substring(0, 50) + "...");
            log("🧼 نص نظيف: " + cleanText);
            
            // تجهيز الأسطر
            prepareLines(cleanText);
            
            // بدء القراءة تلقائياً
            setTimeout(startReading, 1000);
        }
    };

    function log(msg) {
        const el = document.getElementById('visual-log');
        el.innerText = msg + "\n" + el.innerText;
    }

    function prepareLines(text) {
        const output = document.getElementById('output-area');
        output.innerHTML = '';
        // تقسيم النص عند النقاط والأسطر الجديدة
        lines = text.split(/[\n\.!؟]+/).map(l => l.trim()).filter(l => l.length > 2);
        
        lines.forEach((line, index) => {
            let div = document.createElement('div');
            div.className = 'line-item';
            div.id = 'line-' + index;
            div.innerText = line;
            output.appendChild(div);
        });    }

    function startReading() {
        if (lines.length === 0) {
            // إذا لم تكن الأسطر جاهزة، جهزها من مربع النص
            const txt = document.getElementById('input').value;
            if(txt) {
                const clean = nuclearClean(txt);
                prepareLines(clean);
            } else {
                log("❌ لا يوجد نص للقراءة");
                return;
            }
        }

        isReading = true;
        currentLineIndex = 0;
        speakLine(currentLineIndex);
    }

    function speakLine(index) {
        if (!isReading || index >= lines.length) {
            stopReading();
            return;
        }

        // تمييز السطر الحالي
        document.querySelectorAll('.line-item').forEach(d => d.classList.remove('line-active'));
        const currentDiv = document.getElementById('line-' + index);
        if(currentDiv) {
            currentDiv.classList.add('line-active');
            currentDiv.scrollIntoView({behavior: "smooth", block: "center"});
        }

        const textToSpeak = lines[index];
        log("🗣️ أقرأ: " + textToSpeak);

        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'ar-SA';
        utterance.rate = 0.9;

        utterance.onend = function() {
            if (isReading) {
                currentLineIndex++;
                setTimeout(() => speakLine(currentLineIndex), 500);
            }
        };

        // === الحل السحري: معالجة الخطأ بالتقسيم ===
        utterance.onerror = function(event) {            log("️ خطأ في القراءة: " + event.error);
            
            // إذا فشل السطر، نحاول تقسيمه إلى نصفين
            if (textToSpeak.length > 5) {
                const mid = Math.floor(textToSpeak.length / 2);
                const part1 = textToSpeak.substring(0, mid);
                const part2 = textToSpeak.substring(mid);
                
                log("🔪 تقسيم السطر ومحاولة النصف الأول: " + part1);
                
                // إزالة السطر الحالي من المصفوفة وإدراج النصفين مكانه
                lines.splice(index, 1, part1, part2);
                
                // إعادة محاولة القراءة من نفس الفهرس (الذي أصبح الآن يحتوي على النصف الأول)
                setTimeout(() => speakLine(index), 200);
            } else {
                // إذا كان السطر قصيراً وفشل، نتجاهله وننتقل للتالي
                log("️ تخطي السطر الفاشل");
                currentLineIndex++;
                setTimeout(() => speakLine(currentLineIndex), 200);
            }
        };

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    function stopReading() {
        isReading = false;
        window.speechSynthesis.cancel();
        document.querySelectorAll('.line-item').forEach(d => d.classList.remove('line-active'));
        log("⏹️ تم الإيقاف");
    }
</script>

</body>
</html>
