<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ReadAid - اقرأ بدون رموز</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e88e5">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #111827;
      padding: 16px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-radius: 40px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #1b2430;
      border: 2px solid #2a3746;
      border-radius: 28px;
      padding: 18px;
      font-size: 20px;
      line-height: 1.6;
      color: white;
      resize: vertical;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .read-btn {
      background: #2e7d32;
      border: none;
      width: 100%;
      padding: 24px;
      font-size: 36px;
      font-weight: bold;      border-radius: 80px;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 0 #1b5e20;
      transition: 0.05s linear;
      text-align: center;
      margin-bottom: 12px;
    }
    .read-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #1b5e20;
    }
    .stop-btn {
      background: #d32f2f;
      border: none;
      width: 100%;
      padding: 18px;
      font-size: 28px;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      display: none;
      margin-bottom: 12px;
    }
    .status {
      background: #00000099;
      border-radius: 40px;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .info {
      font-size: 14px;
      text-align: center;
      color: #aaa;
      margin-top: 20px;
    }
    .debug-toggle {
      background: #374151;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      margin: 10px auto;
      display: block;
    }    .debug-box {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      direction: ltr;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      display: none;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .debug-box.show { display: block; }
  </style>
</head>
<body>
<div class="header">🔊 ReadAid</div>
<textarea id="textInput" placeholder="الصق النص هنا أو شاركه من أي تطبيق..."></textarea>
<button id="readBtn" class="read-btn">🔊 اقرأ النص</button>
<button id="stopBtn" class="stop-btn">⏹️ إيقاف القراءة</button>
<div id="status" class="status">✅ اضغط الزر لقراءة النص (يتم إزالة الإيموجي والرموز الخفية تلقائياً)</div>
<button id="debugToggle" class="debug-toggle">🔍 عرض المعاينة (للمطورين)</button>
<div id="debugBox" class="debug-box"></div>
<div class="info">✏️ التطبيق يزيل: الإيموجي ❤️، الروابط 🔗، والرموز الخفية 🕵️ تلقائياً.</div>

<script>
  const textarea = document.getElementById('textInput');
  const readBtn = document.getElementById('readBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusDiv = document.getElementById('status');
  const debugToggle = document.getElementById('debugToggle');
  const debugBox = document.getElementById('debugBox');
  let isReading = false;
  let currentUtterance = null;

  // 🎯 الدالة المحسنة جداً: تنظيف مزدوج للنص
  function cleanTextForSpeech(text) {
    if (!text) return '';
    
    // === المرحلة 1: إزالة الرموز الخفية والتنسيق ===
    let cleaned = text
      // إزالة Zero-width characters (الأكثر شيوعاً في النصوص المشاركة)
      .replace(/[\u200B-\u200D\uFEFF]/g, '')
      // إزالة علامات اتجاه النص الخفية
      .replace(/[\u200E\u200F\u202A-\u202E]/g, '')
      // تحويل المسافات غير القابلة للكسر إلى مسافات عادية
      .replace(/[\u00A0\u1680\u2000-\u200A\u202F\u205F\u3000]/g, ' ')      // إزالة أي أحرف تحكم أخرى (Control characters)
      .replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
    
    // === المرحلة 2: إزالة الروابط ===
    cleaned = cleaned.replace(/https?:\/\/\S+/gi, '')
                     .replace(/www\.\S+/gi, '');
    
    // === المرحلة 3: الفلتر الرئيسي - نحتفظ فقط بالمسموح ===
    // ⚠️ حرف 'u' ضروري للتعامل مع الإيموجي كوحدة واحدة
    cleaned = cleaned.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDCF\uFDF0-\uFDFF\uFE70-\uFEFFa-zA-Z0-9\s\.,!?؟،؛:;\-\(\)'""]/gu, '');
    
    // === المرحلة 4: تنظيف نهائي ===
    cleaned = cleaned
      .replace(/\s+/g, ' ')      // توحيد المسافات
      .replace(/\s+([.,!?؟،؛:])/g, '$1')  // إزالة مسافة قبل علامة ترقيم
      .replace(/([.,!?؟،؛:])\s+/g, '$1 ') // مسافة واحدة بعد علامة ترقيم
      .trim();
    
    return cleaned;
  }

  // 🔍 دالة مساعدة لعرض الرموز الخفية (لأغراض التصحيح)
  function showHiddenChars(text) {
    if (!text) return '(فارغ)';
    return text
      .replace(/[\u200B]/g, '[ZWSP]')
      .replace(/[\u200C]/g, '[ZWNJ]')
      .replace(/[\u200D]/g, '[ZWJ]')
      .replace(/[\uFEFF]/g, '[BOM]')
      .replace(/[\u200E]/g, '[LRM]')
      .replace(/[\u200F]/g, '[RLM]')
      .replace(/[\u00A0]/g, '[NBSP]')
      .replace(/\n/g, '[\\n]');
  }

  function showStatus(msg, isError = false) {
    statusDiv.innerText = msg;
    statusDiv.style.background = isError ? "#a22" : "#00000099";
    setTimeout(() => {
      if (statusDiv.innerText === msg)
        statusDiv.style.background = "#00000099";
    }, 3000);
  }

  function stopReading() {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    isReading = false;
    stopBtn.style.display = 'none';    readBtn.style.display = 'block';
    showStatus("⏹️ توقفت القراءة");
  }

  function startReading() {
    const rawText = textarea.value;
    if (!rawText.trim()) {
      showStatus("⚠️ لا يوجد نص. أرسل نصاً أو اكتبه أولاً.", true);
      return;
    }
    
    // عرض المعاينة إذا كانت مفعلة
    if (debugBox.classList.contains('show')) {
      const preview = {
        '📥 الأصل': rawText.substring(0, 200),
        '🔍 مع الرموز الخفية': showHiddenChars(rawText.substring(0, 200)),
        '✨ بعد التنظيف': cleanTextForSpeech(rawText).substring(0, 200)
      };
      debugBox.innerText = Object.entries(preview)
        .map(([k, v]) => `${k}: ${v}`)
        .join('\n\n');
    }
    
    showStatus("🧹 جاري التنظيف المزدوج...");
    
    setTimeout(() => {
      const clean = cleanTextForSpeech(rawText);
      
      if (!clean) {
        showStatus("❌ لم يبقَ نص صالح بعد التنظيف. تأكد من وجود أحرف عربية أو إنجليزية.", true);
        return;
      }
      
      stopReading();
      
      currentUtterance = new SpeechSynthesisUtterance(clean);
      currentUtterance.lang = "ar-SA";
      currentUtterance.rate = 0.85;
      currentUtterance.pitch = 1.0;
      
      currentUtterance.onstart = () => {
        isReading = true;
        stopBtn.style.display = 'block';
        readBtn.style.display = 'none';
        showStatus("🔊 جارٍ القراءة...");
      };
      
      currentUtterance.onend = () => {
        isReading = false;
        stopBtn.style.display = 'none';        readBtn.style.display = 'block';
        showStatus("✅ انتهت القراءة");
      };
      
      currentUtterance.onerror = (e) => {
        isReading = false;
        stopBtn.style.display = 'none';
        readBtn.style.display = 'block';
        console.error("❌ خطأ:", e);
        showStatus("⚠️ خطأ في النطق", true);
      };
      
      speechSynthesis.speak(currentUtterance);
    }, 150);
  }

  function getSharedText() {
    const params = new URLSearchParams(window.location.search);
    let shared = params.get('text') || params.get('title');
    if (shared) {
      shared = decodeURIComponent(shared);
      textarea.value = shared;
      showStatus("📥 تم الاستلام. اضغط 'اقرأ النص'");
      localStorage.setItem('readaid_last', shared);
    } else {
      const last = localStorage.getItem('readaid_last');
      if (last && !textarea.value.trim()) {
        textarea.value = last;
        showStatus("📄 تم استعادة آخر نص");
      }
    }
  }

  // الأزرار
  readBtn.onclick = startReading;
  stopBtn.onclick = stopReading;
  
  // زر التصحيح
  debugToggle.onclick = () => {
    debugBox.classList.toggle('show');
    if (debugBox.classList.contains('show') && textarea.value) {
      debugBox.innerText = '🔍 النص الخام:\n' + showHiddenChars(textarea.value.substring(0, 300));
    }
  };

  textarea.addEventListener('input', () => {
    localStorage.setItem('readaid_last', textarea.value);
  });

  // اختصارات  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      isReading ? stopReading() : startReading();
    }
    if (e.key === 'Escape' && isReading) stopReading();
  });

  window.addEventListener('load', () => {
    getSharedText();
    if (!('speechSynthesis' in window)) {
      showStatus("⚠️ متصفحك لا يدعم الصوت. جرب Chrome.", true);
      readBtn.disabled = true;
    }
  });
</script>
</body>
</html>
