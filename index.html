<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReadAid - الإصدار الحاسم والمعتمد</title>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-box: #1e293b;
    --border: #334155;
    --text-muted: #94a3b8;
    --primary-blue: #3b82f6;
    --success-green: #10b981;
    --danger-red: #ef4444;
  }

  body { 
    background: var(--bg-main); 
    color: #fff; 
    font-family: system-ui, -apple-system, sans-serif; 
    padding: 15px; 
    margin: 0; 
  }
  
  h2 { text-align: center; color: #38bdf8; margin-top: 5px; margin-bottom: 15px; font-weight: 900; }
  
  .box { 
    background: var(--bg-box); 
    padding: 14px; 
    border-radius: 12px; 
    margin-bottom: 12px; 
    border: 1px solid var(--border); 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 6px; font-weight: bold; }
  
  textarea { 
    width: 100%; 
    height: 90px; 
    background: #0b1220; 
    color: #fff; 
    border: 1px solid #475569; 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 16px; 
    resize: none; 
    direction: rtl; 
    box-sizing: border-box;
  }
  
  .clean-box textarea { 
    color: #4ade80; 
    border-color: #22c55e; 
    font-size: 20px; /* خط أكبر ومريح لكبار السن */
    font-weight: bold;
    height: 120px;
  }
  
  button { 
    width: 100%; 
    padding: 18px; 
    font-size: 18px; 
    font-weight: 900; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    margin-top: 5px; 
    transition: all 0.2s ease; 
  }
  
  /* الحالات المتغيرة للزر الرئيسي بناءً على اقتراحك */
  .btn-wait { background: #334155; color: var(--text-muted); cursor: not-allowed; }
  .btn-prepare { background: var(--primary-blue); color: #fff; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
  .btn-go { background: var(--success-green); color: #fff; box-shadow: 0 4px 15px rgba(16,185,129,0.4); }
  .btn-stop { background: var(--danger-red); color: #fff; display: none; }
  
  #log { 
    background: #000; 
    color: #4ade80; 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 12px; 
    font-family: monospace; 
    height: 80px; 
    overflow: auto; 
    white-space: pre-wrap; 
    direction: ltr; 
    text-align: left; 
  }
</style>
</head>
<body>

<h2>ReadAid - القراءة الآمنة بنظام الفرز</h2>

<div class="box">
  <label>📥 1. النص المستلم من المشاركة (خام):</label>
  <textarea id="rawInput" placeholder="بانتظار استقبال النص من المشاركة أو الصقه هنا يدوياً..."></textarea>
</div>

<button id="actionBtn" class="btn-wait" disabled>⏳ بانتظار النص...</button>
<button id="stopBtn" class="btn-stop">⏹️ إيقاف القراءة الصوتية</button>

<div class="box clean-box" style="margin-top: 15px;">
  <label>🧼 2. النص المصفى والمجهز (جاهز تماماً):</label>
  <textarea id="cleanInput" readonly placeholder="سيظهر النص هنا نقياً ومقسماً بعد الضغط على زر التجهيز..."></textarea>
</div>

<div class="box">
  <label>📜 سجل فحص الأكواد والمحرك:</label>
  <div id="log">النظام جاهز ومستعد...</div>
</div>

<script>
const rawIn = document.getElementById('rawInput');
const cleanIn = document.getElementById('cleanInput');
const btn = document.getElementById('actionBtn');
const stopBtn = document.getElementById('stopBtn');
const logBox = document.getElementById('log');

// حالات التطبيق: 0 = بانتظار نص، 1 = جاهز للتجهيز، 2 = مجهز وجاهز للقراءة
let appState = 0; 

function log(msg) {
  logBox.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logBox.textContent;
}

// تنظيف الرموز بشكل قطعي وصارم جداً
function nuclearClean(text) {
  if(!text) return '';
  let t = text;
  // حذف الروابط ووسوم الـ HTML
  t = t.replace(/https?:\/\/\S+/gi, '').replace(/<[^>]*>/g, '');
  // مصفاة الحروف العربية واللاتينية والأرقام والمسافات وعلامات الوقف الإنسانية الأساسية فقط
  t = t.replace(/[^\u0600-\u06FF\u0610-\u061A\u064B-\u0652A-Za-z0-9\s\.\،\!\؟]/g, ' ');
  // سحق الرموز الصفرية والمخفية تماماً
  t = t.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u2069\uFEFF\u00AD\u061C\uFE0E\uFE0F]/g, '');
  // إلغاء الفراغات المتكررة الناتجة عن حذف الرموز
  return t.replace(/\s+/g, ' ').trim();
}

// استخراج النص المستلم من المشاركة بأمان
function extractText() {
  const params = new URLSearchParams(window.location.search);
  let raw = '';
  const keys = ['text', 'share', 'title', 'content', 'q', 'msg', 'data'];
  for(let k of keys) {
    if(params.has(k)) { raw = params.get(k); break; }
  }
  if(!raw) {
    for(let [k, v] of params.entries()) {
      if(v.length > 10) { raw = v; break; }
    }
  }
  return raw;
}

// استقبال المشاركة الصامت
function checkIncomingShare() {
  const raw = extractText();
  if(raw) {
    try {
      const decoded = decodeURIComponent(raw.replace(/\+/g, ' '));
      rawIn.value = decoded;
      log(`📥 تم استقبال نص بنجاح (${decoded.length} حرف). خطوة (1) مكتملة.`);
      setButtonState(1); // تحويل الزر لـ "تجهيز النص"
    } catch(e) {
      log(`❌ خطأ في فك تشفير الرابط: ${e.message}`);
    }
  } else {
    log(`ℹ️ لم يتم مشاركة نص خارجي. يمكنك الكتابة أو اللصق اليدوي.`);
    setButtonState(1); // تفعيل الزر ليعمل باللصق اليدوي أيضاً
  }
}

// التحكم بشكل ووظيفة الزر حسب مرحلة العمل
function setButtonState(state) {
  appState = state;
  if(state === 1) {
    btn.textContent = "🛠️ اضغط هنا لتجهيز وتصفية النص";
    btn.className = "btn-prepare";
    btn.disabled = false;
  } else if(state === 2) {
    btn.textContent = "🔊 ابدأ القراءة الصوتية الآن";
    btn.className = "btn-go";
    btn.disabled = false;
  }
}

// الوظيفة المشتركة للزر حسب حالته الحالية
function handleAction() {
  if (appState === 1) {
    // خطوة التجهيز والتنظيف قبل القراءة
    if(window.speechSynthesis) window.speechSynthesis.cancel(); // تصفير كامل للمحرك وهو صامت
    
    const rawText = rawIn.value.trim();
    if(!rawText) {
      log("⚠️ الرجاء كتابة أو لصق نص أولاً!");
      return;
    }
    
    log("🧼 جاري تشغيل الفلتر النووي لعزل الرموز والإيموجي...");
    const cleanedText = nuclearClean(rawText);
    cleanIn.value = cleanedText;
    
    if(cleanedText.length < 2) {
      log("❌ النص فارغ تماماً بعد التصفية! قد يحتوي على رموز تعبيرية فقط.");
      return;
    }
    
    log("✅ تم التنظيف والتجهيز بنجاح! الرموز عُزلت تماماً.");
    setButtonState(2); // تحويل الزر إلى "ابدأ القراءة"
    
  } else if (appState === 2) {
    // خطوة بدء القراءة الفعلية للنص النظيف والمستقر
    startReading();
  }
}

// تشغيل محرك النطق للنص النقي بنسبة 100%
function startReading() {
  const text = cleanIn.value.trim();
  if(!text) return;
  
  btn.style.display = 'none';
  stopBtn.style.display = 'block';
  log('🟢 بدأت القراءة الصوتية للنص المصفى...');
  
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA';
  utter.rate = 0.83; // سرعة هادئة ومريحة للمسن
  
  utter.onend = () => {
    log('✅ انتهت قراءة النص بالكامل بنجاح مذهل.');
    stopReading();
  };
  
  utter.onerror = (e) => {
    log(`⚠️ تنبيه من المحرك: ${e.error}`);
    stopReading();
  };
  
  try {
    window.speechSynthesis.speak(utter);
  } catch(err) {
    log(`💥 خطأ في النظام: ${err.message}`);
    stopReading();
  }
}

function stopReading() {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  btn.style.display = 'block';
  stopBtn.style.display = 'none';
  setButtonState(1); // إعادة التطبيق لوضع الاستعداد التجهيزي
  log('⏹️ تم إيقاف وتصفير المحرك بنجاح.');
}

// مستمعي الأحداث والروابط للزر
btn.addEventListener('click', handleAction);
stopBtn.addEventListener('click', stopReading);

// مراقبة كتابة النص يدوياً لتحديث حالة الزر فوراً
rawIn.addEventListener('input', () => {
  if(appState !== 1) setButtonState(1);
});

// التشغيل المستقر عند فتح التطبيق
window.addEventListener('DOMContentLoaded', () => {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  checkIncomingShare();
});
</script>

</body>
</html>
