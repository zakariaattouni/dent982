<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ReadAid - قارئ عالمي</title>
  <style>
    :root { --bg: #0b1220; --card: #111827; --border: #2a3746; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: system-ui, 'Segoe UI', sans-serif; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 650px; }
    h1 { text-align: center; padding: 18px; background: var(--card); border-radius: 22px; margin-bottom: 18px; font-size: 26px; box-shadow: 0 4px 12px #0005; }
    textarea { width: 100%; height: 160px; background: #1b2430; border: 2px solid var(--border); border-radius: 18px; padding: 16px; font-size: 18px; color: #fff; resize: vertical; margin-bottom: 14px; line-height: 1.7; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .btn { flex: 1; padding: 16px; font-size: 19px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; transition: 0.1s; }
    .btn:active { transform: translateY(2px); }
    .btn-read { background: var(--green); color: #fff; }
    .btn-stop { background: var(--red); color: #fff; display: none; }
    .btn-paste { background: var(--blue); color: #fff; }
    .btn-debug { background: #4b5563; color: #fff; font-size: 14px; padding: 12px; }
    .status { background: var(--card); padding: 14px; border-radius: 16px; text-align: center; margin: 12px 0; min-height: 24px; font-size: 16px; transition: 0.3s; }
    .debug { background: #0f172a; border-radius: 16px; padding: 14px; font-family: monospace; font-size: 12px; direction: ltr; text-align: left; display: none; max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 12px; border: 1px solid var(--border); }
    .debug.show { display: block; }
    .info { font-size: 13px; color: #94a3b8; text-align: center; margin-top: 18px; line-height: 1.6; }
    .badge { display: inline-block; background: #1e3a5f; padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔊 ReadAid</h1>
  <textarea id="txt" placeholder="الصق هنا، أو شارك النص من أي تطبيق..."></textarea>
  
  <div class="btn-row">
    <button id="btnRead" class="btn btn-read">🔊 اقرأ النص</button>
    <button id="btnStop" class="btn btn-stop">⏹️ إيقاف</button>
  </div>
  <div class="btn-row">
    <button id="btnPaste" class="btn btn-paste">📋 لصق ذكي</button>
    <button id="btnDebug" class="btn btn-debug">🔍 تشخيص</button>
  </div>

  <div id="status" class="status">✅ جاهز لقراءة أي نص من أي مصدر</div>
  <div id="debugBox" class="debug"></div>
  <div class="info">
    🛡️ يزيل تلقائياً: إيموجي، رموز، روابط، تنسيقات واتساب/فيسبوك، أحرف خفية من الملاحظات.<br>
    <span class="badge">فلترة بيضاء صارمة → أحرف + أرقام + ترقيم فقط</span>
  </div>
</div>

<script>  const txt = document.getElementById('txt');
  const btnRead = document.getElementById('btnRead');
  const btnStop = document.getElementById('btnStop');
  const btnPaste = document.getElementById('btnPaste');
  const btnDebug = document.getElementById('btnDebug');
  const status = document.getElementById('status');
  const debugBox = document.getElementById('debugBox');
  let isReading = false, utterance = null;

  // 🛡️ الدالة النووية: تنظيف عالمي مضمون
  function cleanUniversalText(raw) {
    if (!raw) return '';
    let text = raw;

    // 1️⃣ فك الترميز المتعدد (يتعامل مع روابط المشاركة المشفرة)
    try { for(let i=0; i<3; i++) text = decodeURIComponent(text); } catch(e) {}

    // 2️⃣ تجريد HTML وعلامات Markdown الشائعة
    text = text.replace(/<[^>]+>/g, ' ').replace(/[*_~`#>]/g, '');

    // 3️⃣ توحيد اليونيكد (يدمج التشكيل مع الحروف بشكل صحيح)
    text = text.normalize('NFC');

    // 4️⃣ الفلترة البيضاء الصارمة (الطريقة الوحيدة المضمونة عالمياً)
    const allowed = [];
    for (const char of text) {
      const code = char.codePointAt(0);
      const isArabic = (code >= 0x0600 && code <= 0x06FF) || (code >= 0x0610 && code <= 0x061A) || 
                       (code >= 0x064B && code <= 0x065F) || code === 0x0670 || 
                       (code >= 0x0750 && code <= 0x077F) || (code >= 0x08A0 && code <= 0x08FF) || 
                       (code >= 0xFB50 && code <= 0xFDFF) || (code >= 0xFE70 && code <= 0xFEFF);
      const isLatin  = (code >= 0x0041 && code <= 0x005A) || (code >= 0x0061 && code <= 0x007A);
      const isDigit  = (code >= 0x0030 && code <= 0x0039);
      const isPunct  = [0x0020, 0x000A, 0x000D, 0x002E, 0x002C, 0x0021, 0x003F, 0x061F, 0x060C, 0x061B, 0x003A, 0x002D, 0x0028, 0x0029, 0x0027, 0x0022, 0x002F, 0x0040].includes(code);
      
      if (isArabic || isLatin || isDigit || isPunct) allowed.push(char);
    }

    // 5️⃣ تنظيف المسافات وعلامات الترقيم
    return allowed.join('').replace(/\s+/g, ' ').trim()
      .replace(/\s+([.,!?؟،؛:;\/@])/g, '$1')
      .replace(/([.,!?؟،؛:;\/@])\s*/g, '$1 ');
  }

  function setStatus(msg, type = 'info') {
    status.textContent = msg;
    status.style.background = type === 'error' ? '#7f1d1d' : '#111827';
    if (type === 'success') setTimeout(() => status.style.background = '#111827', 3000);
  }
  function runDebug(original, cleaned) {
    const stats = `📥 أصل: ${original.length} حرف\n✨ بعد التنظيف: ${cleaned.length} حرف\n🔤 عربي؟ ${/[\u0600-\u06FF]/.test(cleaned) ? '✅ نعم' : '❌ لا'}\n⚙️ صوت؟ ${'speechSynthesis' in window ? '✅ مدعوم' : '❌ غير مدعوم'}\n📝 عينة: "${cleaned.substring(0, 60)}${cleaned.length > 60 ? '...' : ''}"`;
    debugBox.textContent = stats;
    debugBox.classList.add('show');
  }

  function stopSpeech() {
    if (speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
    isReading = false;
    btnStop.style.display = 'none';
    btnRead.style.display = 'block';
    setStatus('⏹️ تم الإيقاف');
  }

  function startSpeech() {
    const raw = txt.value;
    if (!raw.trim()) return setStatus('⚠️ لا يوجد نص. الصق أو اكتب نصاً أولاً.', 'error');

    const cleaned = cleanUniversalText(raw);
    if (!cleaned) return setStatus('❌ النص فارغ بعد التنظيف. تأكد من وجود أحرف أو أرقام.', 'error');

    if (debugBox.classList.contains('show')) runDebug(raw, cleaned);

    stopSpeech();
    try {
      utterance = new SpeechSynthesisUtterance(cleaned);
      utterance.lang = 'ar-SA';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      
      utterance.onstart = () => { isReading = true; btnStop.style.display = 'block'; btnRead.style.display = 'none'; setStatus('🔊 جارٍ القراءة...', 'success'); };
      utterance.onend   = () => { isReading = false; btnStop.style.display = 'none'; btnRead.style.display = 'block'; setStatus('✅ انتهت القراءة', 'success'); };
      utterance.onerror = (e) => { stopSpeech(); setStatus(`⚠️ خطأ صوت: ${e.error || 'غير معروف'}`, 'error'); };
      
      speechSynthesis.speak(utterance);
    } catch(e) { setStatus('❌ خطأ تقني: ' + e.message, 'error'); }
  }

  // 📋 لصق ذكي: يتجاوز تنسيقات HTML/RTF ويأخذ النص الخام فقط
  btnPaste.onclick = async () => {
    try {
      const clip = await navigator.clipboard.readText();
      txt.value = clip;
      setStatus('📥 تم اللصق الآمن', 'success');
      if (debugBox.classList.contains('show')) runDebug(clip, cleanUniversalText(clip));
    } catch(e) { setStatus('⚠️ الصق يدوياً (Ctrl+V). المتصفح يتطلب HTTPS للوصول للحافظة.', 'error'); }
  };

  btnRead.onclick = startSpeech;
  btnStop.onclick = stopSpeech;  btnDebug.onclick = () => {
    debugBox.classList.toggle('show');
    if (debugBox.classList.contains('show') && txt.value) runDebug(txt.value, cleanUniversalText(txt.value));
  };

  // استقبال النصوص المشتركة عبر الرابط (?text= أو ?title=)
  function loadSharedText() {
    const params = new URLSearchParams(window.location.search);
    const shared = params.get('text') || params.get('title') || params.get('content') || params.get('body');
    if (shared) {
      try { txt.value = decodeURIComponent(shared); } catch(e) { txt.value = shared; }
      setStatus('📥 تم استلام النص المشارك', 'success');
      localStorage.setItem('readaid_last', txt.value);
    } else {
      const saved = localStorage.getItem('readaid_last');
      if (saved) txt.value = saved;
    }
  }

  // تهيئة المتصفح
  window.addEventListener('load', () => {
    loadSharedText();
    if ('speechSynthesis' in window) speechSynthesis.getVoices(); // تحميل مبكر للأصوات في Chrome
  });

  txt.addEventListener('input', () => localStorage.setItem('readaid_last', txt.value));
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); isReading ? stopSpeech() : startSpeech(); }
    if (e.key === 'Escape' && isReading) stopSpeech();
  });
</script>
</body>
</html>
