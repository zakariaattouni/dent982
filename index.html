<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadAid</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
}

header{
padding:14px;
text-align:center;
background:#111827;
font-size:20px;
font-weight:900;
}

textarea{
width:100%;
height:160px;
padding:12px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

#out{
padding:14px;
font-size:26px;
line-height:2;
font-weight:800;
}

.line{
padding:12px;
margin-bottom:10px;
background:#1b2430;
border-radius:12px;
}

button{
width:100%;
padding:16px;
font-size:18px;
font-weight:900;
border:none;
background:#1e88e5;
color:#fff;
}

#fab{
position:fixed;
bottom:20px;
left:20px;
width:70px;
height:70px;
border-radius:50%;
background:#d32f2f;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
box-shadow:0 4px 12px rgba(0,0,0,.4);
user-select:none;
}

#fab:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<header>ReadAid — قارئ بسيط لكبار السن</header>

<textarea id="input" placeholder="الصق النص أو سيتم استقباله من المشاركة..."></textarea>

<button onclick="prepare()">تحويل النص</button>
<button onclick="readAll()">قراءة كاملة</button>

<div id="out"></div>

<div id="fab" onclick="stop()">⏹</div>

<script>

let reading = false;
let index = 0;

/* 🔥 تنظيف قوي */
function clean(text){
return text
.replace(/https?:\/\/\S+/g,'')
.replace(/[\p{Extended_Pictographic}]/gu,'')
.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g,'')
.replace(/[^a-zA-Z0-9\u0600-\u06FF\s]/g,'')
.replace(/\s+/g,' ')
.trim();
}

/* تقسيم بسيط */
function split(text){
return clean(text)
.split(/[\n\.!\?؟،]+/)
.map(s=>s.trim())
.filter(s=>s.length>2);
}

/* تجهيز العرض */
function prepare(){
const parts = split(document.getElementById("input").value);

const out = document.getElementById("out");
out.innerHTML = "";

parts.forEach(p=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = p;
out.appendChild(div);
});
}

/* قراءة كاملة */
function readAll(){

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading = true;
index = 0;

function speak(){

if(!reading) return;

if(index >= lines.length){
reading = false;
return;
}

lines[index].scrollIntoView({behavior:"smooth",block:"center"});

let text = clean(lines[index].innerText);

const u = new SpeechSynthesisUtterance(text);
u.lang = "ar-SA";
u.rate = 0.85;

u.onend = ()=>{
index++;
speak();
};

speechSynthesis.cancel();
speechSynthesis.speak(u);
}

speak();
}

/* إيقاف فوري */
function stop(){
reading = false;
speechSynthesis.cancel();
}

/* استقبال المشاركة من أي تطبيق */
window.onload = () => {
const params = new URLSearchParams(location.search);
const shared = params.get("text");
if(shared){
document.getElementById("input").value = decodeURIComponent(shared);
prepare();
}
};

</script>

</body>
</html>
