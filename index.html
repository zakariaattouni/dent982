<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReadAid - التحكم الصارم</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-box: #1e293b;
    --border: #334155;
    --text-muted: #94a3b8;
    --primary-blue: #3b82f6;
    --success-green: #10b981;
    --danger-red: #ef4444;
  }

  body { 
    background: var(--bg-main); 
    color: #fff; 
    font-family: system-ui, -apple-system, sans-serif; 
    padding: 15px; 
    margin: 0; 
  }
  
  h2 { text-align: center; color: #38bdf8; margin-top: 5px; margin-bottom: 15px; font-weight: 900; }
  
  .box { 
    background: var(--bg-box); 
    padding: 14px; 
    border-radius: 12px; 
    margin-bottom: 12px; 
    border: 1px solid var(--border); 
  }
  
  label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 6px; font-weight: bold; }
  
  textarea { 
    width: 100%; 
    height: 90px; 
    background: #0b1220; 
    color: #fff; 
    border: 1px solid #475569; 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 16px; 
    resize: none; 
    direction: rtl; 
    box-sizing: border-box;
  }
  
  .clean-box textarea { 
    color: #4ade80; 
    border-color: #22c55e; 
    font-size: 20px; 
    font-weight: bold;
    height: 120px;
  }
  
  button { 
    width: 100%; 
    padding: 18px; 
    font-size: 18px; 
    font-weight: 900; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    margin-top: 5px; 
    transition: all 0.2s ease; 
  }
  
  .btn-wait { background: #334155; color: var(--text-muted); cursor: not-allowed; }
  .btn-prepare { background: var(--primary-blue); color: #fff; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
  .btn-go { background: var(--success-green); color: #fff; box-shadow: 0 4px 15px rgba(16,185,129,0.4); }
  .btn-stop { background: var(--danger-red); color: #fff; display: none; }
  
  #log { 
    background: #000; 
    color: #4ade80; 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 12px; 
    font-family: monospace; 
    height: 80px; 
    overflow: auto; 
    white-space: pre-wrap; 
    direction: ltr; 
    text-align: left; 
  }
</style>
</head>
<body>

<h2>ReadAid - القراءة الآمنة بنظام الفرز</h2>

<div class="box">
  <label>📥 1. النص المستلم من المشاركة (خام):</label>
  <textarea id="rawInput" placeholder="بانتظار استقبال النص من المشاركة أو الصقه هنا يدوياً..."></textarea>
</div>

<button id="actionBtn" class="btn-wait" disabled>⏳ بانتظار النص...</button>
<button id="stopBtn" class="btn-stop">⏹️ إيقاف القراءة الصوتية</button>

<div class="box clean-box" style="margin-top: 15px;">
  <label>🧼 2. النص المصفى والمجهز (جاهز تماماً):</label>
  <textarea id="cleanInput" readonly placeholder="سيظهر النص هنا نقياً بعد الضغط على زر التجهيز..."></textarea>
</div>

<div class="box">
  <label>📜 سجل فحص الأكواد والمحرك:</label>
  <div id="log">النظام مستقر وجاهز...</div>
</div>

<script>
const rawIn = document.getElementById('rawInput');
const cleanIn = document.getElementById('cleanInput');
const btn = document.getElementById('actionBtn');
const stopBtn = document.getElementById('stopBtn');
const logBox = document.getElementById('log');

// 0 = انتظار، 1 = جاهز للتنظيف، 2 = مجهز وجاهز للقراءة
let appState = 0; 
let hasProcessedShare = false; // حاجز أمان لمنع تكرار الاستقبال التلقائي

function log(msg) {
  logBox.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logBox.textContent;
}

// الفلتر النووي الصارم لحذف الإيموجي والرموز كلياً
function nuclearClean(text) {
  if(!text) return '';
  let t = text;
  t = t.replace(/https?:\/\/\S+/gi, '').replace(/<[^>]*>/g, '');
  // الإبقاء فقط على الحروف العربية والإنجليزية والأرقام وعلامات الترقيم الأساسية جداً
  t = t.replace(/[^\u0600-\u06FF\u0610-\u061A\u064B-\u0652A-Za-z0-9\s\.\،\!\؟]/g, ' ');
  t = t.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u2069\uFEFF\u00AD\u061C\uFE0E\uFE0F]/g, '');
  return t.replace(/\s+/g, ' ').trim();
}

function extractText() {
  const params = new URLSearchParams(window.location.search);
  let raw = '';
  const keys = ['text', 'share', 'title', 'content', 'q', 'msg', 'data'];
  for(let k of keys) {
    if(params.has(k)) { raw = params.get(k); break; }
  }
  if(!raw) {
    for(let [k, v] of params.entries()) {
      if(v.length > 10) { raw = v; break; }
    }
  }
  return raw;
}

// استقبال النص لمرة واحدة فقط وبشكل صامت تماماً
function checkIncomingShare() {
  if (hasProcessedShare) return; // إذا تم الفحص مسبقاً، اخرج فوراً لمنع التداخل
  hasProcessedShare = true;

  const raw = extractText();
  if(raw) {
    try {
      const decoded = decodeURIComponent(raw.replace(/\+/g, ' '));
      rawIn.value = decoded;
      log(`📥 تم استقبال النص الخام بنجاح. بانتظار أمر التجهيز من طرفك.`);
      setButtonState(1); 
    } catch(e) {
      log(`❌ خطأ فك التشفير: ${e.message}`);
      setButtonState(1);
    }
  } else {
    log(`ℹ️ لم يتم العثور على نص مشارك خارجي. يمكنك اللصق اليدوي.`);
    setButtonState(1); 
  }
}

function setButtonState(state) {
  appState = state;
  if(state === 1) {
    btn.textContent = "🛠️ اضغط هنا لتجهيز وتصفية النص";
    btn.className = "btn-prepare";
    btn.disabled = false;
    btn.style.display = 'block';
    stopBtn.style.display = 'none';
  } else if(state === 2) {
    btn.textContent = "🔊 ابدأ القراءة الصوتية الآن";
    btn.className = "btn-go";
    btn.disabled = false;
    btn.style.display = 'block';
    stopBtn.style.display = 'none';
  }
}

// معالجة الضغط اليدوي الصارم
function handleAction() {
  if (appState === 1) {
    // خطوة (1): تنظيف المحرك وهو صامت تماماً وتجهيز النص بصرياً
    if(window.speechSynthesis) window.speechSynthesis.cancel(); 
    
    const rawText = rawIn.value.trim();
    if(!rawText) {
      log("⚠️ لا يوجد نص في الخانة الخام لتجهيزه!");
      return;
    }
    
    log("🧼 جاري تنظيف النص من الإيموجي والرموز...");
    const cleanedText = nuclearClean(rawText);
    cleanIn.value = cleanedText;
    
    if(cleanedText.length < 2) {
      log("❌ النص فارغ بعد التصفية الصارمة!");
      return;
    }
    
    log("✅ اكتمل التجهيز وعُزلت الرموز! يمكنك الضغط مجدداً لبدء القراءة بنقاء.");
    setButtonState(2); // التجهيز تم بنجاح، ننتظر ضغطة القراءة
    
  } else if (appState === 2) {
    // خطوة (2): القراءة الفعلية
    startReading();
  }
}

function startReading() {
  const text = cleanIn.value.trim();
  if(!text) return;
  
  btn.style.display = 'none';
  stopBtn.style.display = 'block';
  log('🟢 بدأت القراءة الصوتية الآن للنص النقي...');
  
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA';
  utter.rate = 0.83; 
  
  utter.onend = () => {
    log('✅ انتهت القراءة بنجاح تام وبدون رموز.');
    stopReading();
  };
  
  utter.onerror = (e) => {
    log(`⚠️ تنبيه المحرك: ${e.error}`);
    stopReading();
  };
  
  try {
    window.speechSynthesis.speak(utter);
  } catch(err) {
    log(`💥 خطأ نظام: ${err.message}`);
    stopReading();
  }
}

function stopReading() {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  setButtonState(1); // إعادة التعيين لوضع التجهيز لحماية المحرك من الرموز القادمة
  log('⏹️ تم إيقاف وتصفير المحرك.');
}

btn.addEventListener('click', handleAction);
stopBtn.addEventListener('click', stopReading);

rawIn.addEventListener('input', () => {
  if(appState !== 1) setButtonState(1);
});

// التشغيل الأحادي المستقر عند التحميل فقط
window.addEventListener('DOMContentLoaded', () => {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  checkIncomingShare();
});
</script>

</body>
</html>
