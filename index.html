<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReadAid Senior</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1218;
color:#fff;
height:100vh;
overflow:hidden;
}

header{
padding:16px;
text-align:center;
background:#111827;
font-size:22px;
font-weight:800;
}

#pasteBox{
width:100%;
height:120px;
padding:14px;
font-size:20px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

#readerContainer{
height:calc(100vh - 270px);
overflow-y:auto;
padding:18px;
font-size:34px;
line-height:2.6;
font-weight:800;
}

.line{
padding:16px;
margin-bottom:12px;
background:#1b2430;
border-radius:14px;
transition:.2s;
}

.activeLine{
background:#1565c0;
transform:scale(1.02);
}

.controls{
position:fixed;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:12px;
background:#111827;
}

button{
padding:16px;
border:none;
border-radius:12px;
background:#1e88e5;
color:#fff;
font-size:18px;
font-weight:800;
}

button:active{transform:scale(.96);}
</style>
</head>

<body>

<header>ReadAid — قارئ مخصص لكبار السن</header>

<textarea id="pasteBox" placeholder="الصق النص هنا..."></textarea>

<div id="readerContainer"></div>

<div class="controls">
<button onclick="prepareText()">تحويل النص</button>
<button onclick="toggleRead()">تشغيل / إيقاف</button>
</div>

<script>

const readerContainer = document.getElementById("readerContainer");
const pasteBox = document.getElementById("pasteBox");

let reading = false;
let index = 0;

/* =========================
   🔥 تنظيف نهائي صارم جدًا
========================= */
function ultraClean(text){

let out = "";

// تفكيك حرفي كامل
for(let ch of text){
const code = ch.codePointAt(0);

// العربية
const arabic =
(code >= 0x0600 && code <= 0x06FF) ||
(code >= 0x0750 && code <= 0x077F) ||
(code >= 0x08A0 && code <= 0x08FF);

// اللاتينية والأرقام
const latinOrNum =
(code >= 0x0041 && code <= 0x007A) ||
(code >= 0x0030 && code <= 0x0039);

// مسافة
if(ch === " "){
out += ch;
continue;
}

// قبول فقط الحروف
if(arabic || latinOrNum){
out += ch;
}
}

return out.replace(/\s+/g,' ').trim();
}

/* =========================
   تقسيم بسيط وواضح
========================= */
function splitSentences(text){
text = ultraClean(text);

return text
.split(/[\n\.!\?؟،]+/)
.map(s => s.trim())
.filter(s => s.length > 1);
}

/* =========================
   تجهيز النص
========================= */
function prepareText(){

const raw = pasteBox.value;
const sentences = splitSentences(raw);

readerContainer.innerHTML = "";

sentences.forEach((s,i)=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = ultraClean(s);
div.dataset.index = i;
readerContainer.appendChild(div);
});
}

/* =========================
   تشغيل الصوت
========================= */
function toggleRead(){

if(reading){
speechSynthesis.cancel();
reading = false;
index = 0;
return;
}

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading = true;
index = 0;

function speak(){

if(!reading) return;

if(index >= lines.length){
reading = false;
return;
}

lines.forEach(l=>l.classList.remove("activeLine"));
lines[index].classList.add("activeLine");

lines[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

let text = ultraClean(lines[index].innerText);

/* حماية إضافية ضد أي شيء غير متوقع */
text = text.split("").filter(ch=>{
return /[a-zA-Z0-9\u0600-\u06FF ]/.test(ch);
}).join("");

const utter = new SpeechSynthesisUtterance(text);

/* مهم لكبار السن */
utter.lang = "ar-SA";
utter.rate = 0.85;   // أبطأ = أوضح
utter.pitch = 1;

utter.onend = ()=>{
index++;
speak();
};

speechSynthesis.cancel();
speechSynthesis.speak(utter);
}

speak();
}

</script>

</body>
</html>
