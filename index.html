<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ReadAid - المشاركة التلقائية</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<style>
  body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
    padding-bottom: 100px;
  }
  .header {
    background: #111827;
    padding: 16px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-radius: 28px;
    margin-bottom: 20px;
  }
  textarea {
    width: 100%;
    height: 150px;
    padding: 15px;
    font-size: 18px;
    background: #1b2430;
    border: none;
    border-radius: 24px;
    color: white;
    resize: vertical;
    margin-bottom: 15px;
  }
  button {
    background: #1e88e5;
    border: none;
    padding: 14px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 60px;
    color: white;
    margin: 6px;
    cursor: pointer;
  }
  .btn-stop {
    background: #d32f2f;
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    display: none;
  }
  .line {
    background: #1b2430;
    margin: 12px 0;
    padding: 18px;
    border-radius: 24px;
    font-size: 26px;
    font-weight: bold;
    border-right: 6px solid transparent;
  }
  .activeLine {
    background: #0d47a1;
    border-right-color: #1e88e5;
    transform: scale(1.01);
  }
  .status {
    background: #000000aa;
    border-radius: 40px;
    padding: 8px 16px;
    text-align: center;
    margin: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">🔊 ReadAid</div>
<textarea id="input" placeholder="سينتقل النص هنا تلقائياً عند المشاركة..."></textarea>
<div id="out"></div>
<button id="stopBtn" class="btn-stop" onclick="stopReading()">⏹️ إيقاف القراءة</button>

<script>
  let reading = false, currentIdx = 0, lines = [];

  function cleanText(t) {
    if (!t) return '';
    let c = t.replace(/https?:\/\/\S+/gi, '').replace(/www\.\S+/gi, '');
    c = c.replace(/[^\u0600-\u06FF\u0610-\u061A\u064B-\u065F\u0670a-zA-Z0-9\s\.,!?؟،؛]/g, '');
    return c.replace(/\s+/g, ' ').trim();
  }

  function splitSentences(text) {
    return text.split(/[\n\.!\?؟،]+/).map(s => s.trim()).filter(s => s.length > 1);
  }

  function displayLines(sentences) {
    const container = document.getElementById('out');
    container.innerHTML = '';
    sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.innerText = s;
      div.onclick = () => { if (reading) stopReading(); currentIdx = i; startReading(); };
      container.appendChild(div);
    });
    lines = document.querySelectorAll('.line');
  }

  function startReading() {
    if (currentIdx >= lines.length) { stopReading(); return; }
    reading = true;
    document.getElementById('stopBtn').style.display = 'block';
    lines.forEach(l => l.classList.remove('activeLine'));
    const current = lines[currentIdx];
    current.classList.add('activeLine');
    current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    let clean = cleanText(current.innerText);
    if (!clean) { currentIdx++; startReading(); return; }
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'ar-SA';
    utter.rate = 0.85;
    utter.onend = () => { if (reading) { currentIdx++; startReading(); } };
    utter.onerror = () => { if (reading) { currentIdx++; startReading(); } };
    speechSynthesis.speak(utter);
  }

  function stopReading() {
    reading = false;
    speechSynthesis.cancel();
    document.getElementById('stopBtn').style.display = 'none';
    if (lines.length) lines.forEach(l => l.classList.remove('activeLine'));
  }

  function autoStart(text) {
    const sentences = splitSentences(text);
    if (!sentences.length) return;
    displayLines(sentences);
    stopReading();
    currentIdx = 0;
    startReading();
  }

  // استقبال النص من المشاركة (طريقة GET)
  function getSharedText() {
    const urlParams = new URLSearchParams(window.location.search);
    let shared = urlParams.get('text') || urlParams.get('title');
    if (shared) {
      shared = decodeURIComponent(shared);
      document.getElementById('input').value = shared;
      autoStart(shared);
    } else if (document.getElementById('input').value.trim()) {
      autoStart(document.getElementById('input').value);
    }
  }

  window.onload = () => {
    getSharedText();
    // إذا لم يأت شيء، نظهر رسالة
    if (!document.getElementById('input').value) {
      const div = document.createElement('div');
      div.className = 'status';
      div.innerText = '📲 أرسل النص عبر زر المشاركة من أي تطبيق';
      document.body.insertBefore(div, document.getElementById('out'));
    }
  };
</script>
</body>
</html>
