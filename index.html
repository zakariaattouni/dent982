<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadAid PWA</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
}

header{
padding:14px;
text-align:center;
background:#111827;
font-weight:900;
}

textarea{
width:100%;
height:160px;
padding:12px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

button{
width:100%;
padding:16px;
font-size:18px;
font-weight:900;
border:none;
background:#1e88e5;
color:#fff;
}

button.danger{
background:#d32f2f;
}

.container{
padding:14px;
font-size:22px;
line-height:2;
}
</style>
</head>

<body>

<header>ReadAid — PWA + Android TTS</header>

<textarea id="text" placeholder="الصق النص هنا أو سيتم استقباله من المشاركة..."></textarea>

<button onclick="speak()">تشغيل القراءة</button>
<button class="danger" onclick="stop()">إيقاف</button>

<div class="container" id="status"></div>

<script>

let utter;

function clean(text){
return text
.replace(/https?:\/\/\S+/g,'')
.replace(/[\p{Extended_Pictographic}]/gu,'')
.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g,'')
.replace(/[^a-zA-Z0-9\u0600-\u06FF\s]/g,'')
.replace(/\s+/g,' ')
.trim();
}

function speak(){

const raw = document.getElementById("text").value;
const text = clean(raw);

document.getElementById("status").innerText = "جاري القراءة...";

if(!text) return;

// 🔥 هنا الفرق: Android Native TTS عبر Intent
const msg = new SpeechSynthesisUtterance(text); 
// ملاحظة: سنستخدم fallback داخل Android (شرح تحت)

msg.lang = "ar-SA";
msg.rate = 0.85;

speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

function stop(){
speechSynthesis.cancel();
document.getElementById("status").innerText = "متوقف";
}

/* استقبال مشاركة النص من Android */
window.onload = () => {
const params = new URLSearchParams(location.search);
const shared = params.get("text");
if(shared){
document.getElementById("text").value = decodeURIComponent(shared);
}
};
</script>

</body>
</html>
