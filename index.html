<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadAid - قارئ ذكي</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4dd0e1">
<style>
body{
margin:0;
font-family:system-ui;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}
.container{
width:100%;
max-width:600px;
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
}
h1{
font-size:22px;
margin-bottom:10px;
}
textarea{
width:100%;
height:200px;
font-size:18px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
resize:none;
}
button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
background:#4dd0e1;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}
button:active{
transform:scale(0.98);
}
</style>
</head>
<body>
<div class="container">
<h1>📖 ReadAid - قارئ ذكي</h1>
<textarea id="text">
الصق أو اكتب النص هنا ليتم قراءته بصوت واضح ومريح للعين.
</textarea>
<button onclick="readText()">▶ تشغيل القراءة</button>
</div>
<script>
/* =========================
   Service Worker تسجيل
========================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
  .then(() => console.log("SW OK"))
  .catch(err => console.log("SW error", err));
}
/* =========================
   قراءة صوتية
========================= */
function speak(text){
  if(!text.trim()) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ar-SA";
  utter.rate = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}
/* =========================
   تشغيل القراءة
========================= */
function readText(){
  const text = document.getElementById("text").value;
  speak(text);
}
/* =========================
   دعم مشاركة نص (اختياري)
   إذا جاء من share target
========================= */
window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const sharedText = params.get("text");
  if(sharedText){
    document.getElementById("text").value = sharedText;
    speak(sharedText);
  }
});
</script>
</body>
</html>
