<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadAid</title>
<style>
:root {
  --bg-main: #0b1220;
  --bg-card: #1b2430;
  --primary: #1e88e5;
  --accent: #0d47a1;
}
body {
  margin: 0;
  padding: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg-main);
  color: #fff;
  min-height: 100vh;
}
header {
  padding: 16px;
  text-align: center;
  background: #111827;
  font-size: 20px;
  font-weight: 900;
}
.container {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 80px;
}
textarea {
  width: 100%;
  height: 120px;
  padding: 12px;
  font-size: 16px;
  border: 2px solid #2a3746;
  border-radius: 12px;
  background: var(--bg-card);
  color: #fff;
  box-sizing: border-box;
}
.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;}
button {
  padding: 14px;
  font-size: 16px;
  font-weight: 800;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
}
button.secondary { background: #2e7d32; }
#out { margin-top: 10px; }
.line {
  padding: 16px;
  margin: 8px 0;
  background: var(--bg-card);
  border-radius: 12px;
  font-size: 24px;
  line-height: 1.6;
  border-right: 4px solid transparent;
}
.line.active {
  background: var(--accent);
  border-right-color: var(--primary);
}
#stopBtn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 300px;
  padding: 14px;
  background: #d32f2f;
  border-radius: 50px;
  text-align: center;
  font-weight: 900;
  display: none;
  cursor: pointer;
}
#status {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(46, 125, 50, 0.9);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;  display: none;
  z-index: 1000;
}
</style>
</head>
<body>

<header>ReadAid</header>
<div id="status">جاري المعالجة...</div>

<div class="container">
  <textarea id="input" placeholder="الصق النص هنا أو شاركه من تطبيق آخر..."></textarea>
  <div class="btn-group">
    <button id="prepareBtn">🛠️ تجهيز</button>
    <button id="readBtn" class="secondary">🔊 قراءة</button>
  </div>
  <div id="out"></div>
</div>

<div id="stopBtn">⏹️ إيقاف</div>

<script>
// المتغيرات العامة
let isReading = false;
let currentIdx = 0;
let lines = [];

// تنظيف صارم - حذف كل شيء إلا العربي والأرقام
function cleanText(txt) {
  if (!txt || typeof txt !== 'string') return '';
  
  // إزالة الروابط
  let c = txt.replace(/https?:\/\/\S+/gi, '');
  
  // إزالة الإيموجي والرموز (نطاقات واسعة)
  c = c.replace(/[\u{1F000}-\u{1FFFF}]/gu, '');
  c = c.replace(/[\u{26000}-\u{26FFF}]/gu, '');
  c = c.replace(/[\u{27000}-\u{27BFF}]/gu, '');
  
  // إزالة الرموز المخفية
  c = c.replace(/[\uFE0E\uFE0F\u200D\u200B\u200C\u20E3]/g, '');
  c = c.replace(/[\u{1F3FB}-\u{1F3FF}]/gu, '');
  
  // الاحتفاظ فقط بالعربية والأرقام والترقيم
  c = c.replace(/[^\u0600-\u06FF\u0750-\u077F0-9\s\.\,\!\?\:\;\-\(\)]/g, '');
  
  // تنظيف المسافات
  c = c.replace(/\s+/g, ' ').trim();
  
  return c;}

// تقسيم النص
function splitText(txt) {
  if (!txt) return [];
  return txt.split(/[\n\.!\?؟،]+/)
    .map(s => cleanText(s))
    .filter(s => s && s.length > 2);
}

// تجهيز النص
function prepare() {
  const input = document.getElementById('input').value;
  if (!input || !input.trim()) {
    showStatus('⚠️ أدخل نصاً أولاً', true);
    return;
  }
  
  const sentences = splitText(input);
  const out = document.getElementById('out');
  out.innerHTML = '';
  stopReading();
  
  if (sentences.length === 0) {
    out.innerHTML = '<p style="text-align:center;color:#aaa">لا يوجد نص صالح بعد التنظيف</p>';
    showStatus('⚠️ النص فارغ بعد التنظيف', true);
    return;
  }
  
  sentences.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = s;
    div.dataset.idx = i;
    div.onclick = function() {
      stopReading();
      currentIdx = i;
      startReading();
    };
    out.appendChild(div);
  });
  
  lines = document.querySelectorAll('.line');
  showStatus(`✅ تم تجهيز ${sentences.length} أسطر`, false);
}

// بدء القراءة
function startReading() {
  if (currentIdx >= lines.length) {
    stopReading();    return;
  }
  
  isReading = true;
  document.getElementById('stopBtn').style.display = 'block';
  
  lines.forEach(l => l.classList.remove('active'));
  const current = lines[currentIdx];
  current.classList.add('active');
  current.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  const text = current.textContent;
  
  if (!text || text.length < 2) {
    currentIdx++;
    setTimeout(startReading, 50);
    return;
  }
  
  window.speechSynthesis.cancel();
  
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA';
  utter.rate = 0.85;
  
  const voices = window.speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang && v.lang.startsWith('ar'));
  if (arVoice) utter.voice = arVoice;
  
  utter.onend = function() {
    if (isReading) {
      currentIdx++;
      setTimeout(startReading, 100);
    }
  };
  
  utter.onerror = function(e) {
    console.error('Error:', e.error);
    window.speechSynthesis.cancel();
    if (isReading) {
      currentIdx++;
      setTimeout(startReading, 100);
    }
  };
  
  try {
    window.speechSynthesis.speak(utter);
  } catch(err) {
    console.error('Speak error:', err);
    currentIdx++;    setTimeout(startReading, 100);
  }
}

// قراءة الكل
function readAll() {
  if (lines.length === 0) prepare();
  if (lines.length === 0) return;
  
  stopReading();
  currentIdx = 0;
  setTimeout(startReading, 100);
}

// إيقاف
function stopReading() {
  isReading = false;
  window.speechSynthesis.cancel();
  document.getElementById('stopBtn').style.display = 'none';
  lines.forEach(l => l.classList.remove('active'));
}

// عرض حالة
function showStatus(msg, isError) {
  const status = document.getElementById('status');
  status.textContent = msg;
  status.style.background = isError ? 'rgba(211, 47, 47, 0.9)' : 'rgba(46, 125, 50, 0.9)';
  status.style.display = 'block';
  setTimeout(() => {
    status.style.display = 'none';
  }, 3000);
}

// استقبال النص المشترك - معالجة محسنة
function handleSharedText() {
  const params = new URLSearchParams(window.location.search);
  
  // محاولة الحصول على النص من مصادر مختلفة
  let sharedText = '';
  
  // المصادر المحتملة للنص المشترك
  const possibleParams = ['text', 'share', 'content', 'title', 'url', 'shared'];
  
  for (let param of possibleParams) {
    const val = params.get(param);
    if (val) {
      try {
        sharedText = decodeURIComponent(val);
        console.log(`✅ تم استلام النص من ${param}:`, sharedText.substring(0, 50));
        break;      } catch(e) {
        console.error('خطأ في فك التشفير:', e);
      }
    }
  }
  
  // إذا لم نجد نصاً، جرب البحث في جميع المعاملات
  if (!sharedText) {
    params.forEach((value, key) => {
      if (!sharedText && value && value.length > 10) {
        try {
          sharedText = decodeURIComponent(value);
          console.log(`✅ تم استلام النص من ${key}:`, sharedText.substring(0, 50));
        } catch(e) {}
      }
    });
  }
  
  // إذا وجدنا نصاً، ضعه في الحقل وابدأ
  if (sharedText) {
    document.getElementById('input').value = sharedText;
    showStatus('📥 تم استلام النص المشترك', false);
    
    // انتظر قليلاً ثم جهز واقرأ
    setTimeout(() => {
      prepare();
      if (lines.length > 0) {
        setTimeout(readAll, 500);
      }
    }, 300);
  }
}

// ربط الأحداث
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('prepareBtn').addEventListener('click', prepare);
  document.getElementById('readBtn').addEventListener('click', readAll);
  document.getElementById('stopBtn').addEventListener('click', stopReading);
  
  // تحميل الأصوات
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
  }
  
  // معالجة النص المشترك
  handleSharedText();
});

// تسجيل Service Worker لـ PWA Share Target
if ('serviceWorker' in navigator) {  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</body>
</html>
