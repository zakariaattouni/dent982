<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReadAid - الحل الجذري</title>
<style>
  :root { --bg:#0b1220; --card:#1b2430; --pri:#1e88e5; --ok:#2e7d32; --err:#d32f2f; --txt:#fff; }
  body { margin:0; padding:15px; font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  h1 { font-size:20px; margin:10px 0 20px; font-weight:900; color:var(--pri); }
  
  textarea { 
    width:100%; height:150px; padding:15px; font-size:18px; 
    border:2px solid #2a3746; border-radius:15px; background:var(--card); 
    color:#aaa; resize:none; margin-bottom:20px; transition:border-color 0.3s;
  }
  textarea.has-text { color:var(--txt); border-color:var(--ok); }
  
  .big-btn {
    width:100%; padding:20px; font-size:22px; font-weight:bold; 
    border:none; border-radius:15px; cursor:pointer; color:#fff; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s;
  }
  .big-btn:active { transform: scale(0.98); }
  .btn-wait { background:#4a5568; cursor: not-allowed; }
  .btn-ready { background:var(--ok); animation: pulse 2s infinite; }
  .btn-stop { background:var(--err); display:none; }

  #status { margin-top:15px; font-size:14px; color:#8899aa; text-align:center; }
  
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(46, 125, 50, 0); }
    100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
  }
</style>
</head>
<body>

<h1>ReadAid</h1>

<textarea id="input" readonly placeholder="انتظار استلام النص..."></textarea>

<button id="actionBtn" class="big-btn btn-wait" disabled>⏳ بانتظار النص...</button>
<button id="stopBtn" class="big-btn btn-stop">⏹️ إيقاف</button>

<div id="status">جاهز</div>

<script>
const input = document.getElementById('input');const btn = document.getElementById('actionBtn');
const stopBtn = document.getElementById('stopBtn');
const status = document.getElementById('status');

let isReading = false;
let lines = [];
let currentIdx = 0;

// 1. وظيفة كشف النص (تعمل عند الفتح وعند العودة للتطبيق)
function checkForText() {
  const params = new URLSearchParams(window.location.search);
  // نبحث عن النص في عدة أماكن محتملة
  let raw = params.get('text') || params.get('share') || params.get('title') || '';
  
  if (raw && input.value === "") { // إذا وجدنا نصاً والمربع فارغ
    try {
      // فك التشفير وتنظيف مبدئي
      let clean = decodeURIComponent(raw.replace(/\+/g, ' '))
        .replace(/[^\u0600-\u06FF0-9\s\.\,\!\?\:\;\-\(\)؟،؛]/g, '')
        .replace(/\s+/g, ' ').trim();
      
      if (clean.length > 2) {
        input.value = clean;
        input.classList.add('has-text');
        btn.textContent = "🔊 اضغط هنا للقراءة";
        btn.className = "big-btn btn-ready";
        btn.disabled = false;
        status.textContent = "✅ تم استلام النص بنجاح!";
        return;
      }
    } catch(e) {}
  }
}

// 2. تشغيل الكشف عند تحميل الصفحة
window.addEventListener('DOMContentLoaded', checkForText);

// 3. 🔑 الحل السحري: تشغيل الكشف عند عودة التطبيق للواجهة
window.addEventListener('focus', checkForText);

// 4. منطق القراءة
btn.addEventListener('click', () => {
  const text = input.value;
  if (!text) return;

  // تقسيم النص
  lines = text.split(/[\n\.!؟؛]+/).map(s => s.trim()).filter(s => s.length > 2);
  if (lines.length === 0) return;

  // تبديل الأزرار  btn.style.display = 'none';
  stopBtn.style.display = 'block';
  status.textContent = `📖 جاري قراءة ${lines.length} سطر...`;
  
  isReading = true;
  currentIdx = 0;
  speakLine(0);
});

stopBtn.addEventListener('click', () => {
  isReading = false;
  window.speechSynthesis.cancel();
  btn.style.display = 'block';
  stopBtn.style.display = 'none';
  status.textContent = "⏹️ تم الإيقاف";
});

function speakLine(idx) {
  if (!isReading || idx >= lines.length) {
    stopBtn.click(); // إيقاف نظيف
    status.textContent = "✅ انتهت القراءة";
    return;
  }

  status.textContent = `🗣️ السطر ${idx + 1} من ${lines.length}`;
  
  const utter = new SpeechSynthesisUtterance(lines[idx]);
  utter.lang = 'ar-SA';
  utter.rate = 0.9;
  
  utter.onend = () => {
    if (isReading) speakLine(idx + 1);
  };
  
  utter.onerror = () => {
    if (isReading) speakLine(idx + 1); // تخطي الخطأ
  };

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

// تحميل الأصوات
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
}
</script>

</body>
</html>
