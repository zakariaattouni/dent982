<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadAid — قارئ مريح لكبار السن</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#111827;
padding:16px;
text-align:center;
font-size:22px;
font-weight:900;
letter-spacing:0.5px;
}

#input{
width:100%;
height:140px;
padding:14px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
resize:none;
}

#container{
flex:1;
overflow-y:auto;
padding:16px;
font-size:34px;
line-height:2.4;
font-weight:800;
}

.line{
padding:14px;
margin-bottom:12px;
background:#1b2430;
border-radius:14px;
transition:0.2s;
}

.active{
background:#1565c0;
transform:scale(1.02);
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:12px;
background:#111827;
}

button{
padding:18px;
font-size:18px;
font-weight:900;
border:none;
border-radius:14px;
color:#fff;
background:#1e88e5;
cursor:pointer;
}

button:active{
transform:scale(0.97);
}

.danger{
background:#d32f2f;
}

.focus .line{
opacity:0.25;
}

.focus .active{
opacity:1;
}
</style>
</head>

<body>

<header>ReadAid — قارئ مريح لكبار السن</header>

<textarea id="input" placeholder="الصق النص هنا من أي مكان..."></textarea>

<div class="controls">
<button onclick="prepare()">تحويل النص</button>
<button onclick="toggleRead()">تشغيل / إيقاف</button>
<button onclick="stopAll()" class="danger">إيقاف فوري</button>
<button onclick="toggleFocus()">وضع التركيز</button>
</div>

<div id="container"></div>

<script>

const container = document.getElementById("container");
const input = document.getElementById("input");

let index = 0;
let reading = false;

/* =========================
   🔥 تنظيف قوي للنص
========================= */
function clean(text){
return text
.replace(/https?:\/\/\S+/g,'')
.replace(/[\p{Extended_Pictographic}]/gu,'')
.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g,'')
.replace(/[^a-zA-Z0-9\u0600-\u06FF\s]/g,'')
.replace(/\s+/g,' ')
.trim();
}

/* =========================
   تقسيم ذكي
========================= */
function split(text){
const t = clean(text);
return t
.split(/[\n\.!\?؟،]+/)
.map(s => s.trim())
.filter(s => s.length > 2);
}

/* =========================
   تجهيز العرض
========================= */
function prepare(){

const sentences = split(input.value);
container.innerHTML = "";

sentences.forEach((s,i)=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = clean(s);
container.appendChild(div);
});
}

/* =========================
   تشغيل القراءة
========================= */
function toggleRead(){

if(reading){
speechSynthesis.cancel();
reading = false;
index = 0;
return;
}

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading = true;
index = 0;

function speak(){

if(!reading) return;
if(index >= lines.length){
reading = false;
return;
}

lines.forEach(l=>l.classList.remove("active"));
lines[index].classList.add("active");

lines[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

let text = clean(lines[index].innerText);

/* تقسيم إضافي لاستقرار الصوت */
text = text
.split(" ")
.filter(w => /[\p{L}\p{N}\u0600-\u06FF]/u.test(w))
.join(" ");

const u = new SpeechSynthesisUtterance(text);
u.lang = "ar-SA";
u.rate = 0.82;
u.pitch = 1;

u.onend = () => {
index++;
speak();
};

speechSynthesis.cancel();
speechSynthesis.speak(u);
}

speak();
}

/* =========================
   إيقاف فوري
========================= */
function stopAll(){
reading = false;
index = 0;
speechSynthesis.cancel();
}

/* =========================
   وضع التركيز
========================= */
function toggleFocus(){
document.body.classList.toggle("focus");
}

</script>

</body>
</html>
