<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReadAid - تدفق خطي</title>
<style>
  :root { --bg:#0b1220; --card:#1b2430; --pri:#1e88e5; --ok:#2e7d32; --err:#d32f2f; --txt:#fff; }
  * { box-sizing: border-box; }
  body { margin:0; padding:0; font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; display:flex; flex-direction:column; }
  header { padding:16px; text-align:center; background:#111827; font-size:20px; font-weight:900; box-shadow:0 2px 10px rgba(0,0,0,.3); }
  .container { padding:15px; flex:1; display:flex; flex-direction:column; gap:12px; margin-bottom:70px; }
  textarea { width:100%; height:110px; padding:12px; font-size:16px; border:2px solid #2a3746; border-radius:12px; background:var(--card); color:var(--txt); resize:none; outline:none; }
  textarea:focus { border-color:var(--pri); }
  .btn { width:100%; padding:14px; font-size:17px; font-weight:800; border:none; border-radius:12px; cursor:pointer; color:#fff; transition:opacity .2s; }
  .btn:active { opacity:.85; }
  .btn-pri { background:var(--pri); }
  .btn-ok { background:var(--ok); }
  .btn-err { background:var(--err); }
  #out { margin-top:10px; }
  .line { padding:15px; margin:8px 0; background:var(--card); border-radius:12px; font-size:22px; line-height:1.5; border-right:4px solid transparent; transition:all .2s; }
  .line.active { background:var(--pri); border-right-color:#fff; transform:scale(1.02); }
  #toast { position:fixed; top:10px; left:50%; transform:translateX(-50%); background:var(--ok); padding:8px 16px; border-radius:20px; font-size:14px; font-weight:700; display:none; z-index:101; white-space:nowrap; }
  #log { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.9); padding:10px; font:12px monospace; color:#aaa; text-align:left; direction:ltr; max-height:100px; overflow:auto; z-index:100; }
</style>
</head>
<body>

<header>ReadAid — القراءة المستقرة</header>
<div id="toast"></div>

<div class="container">
  <textarea id="input" placeholder="الصق النص أو شاركه من تطبيق آخر..."></textarea>
  
  <!-- التدفق الخطي: تجهيز → قراءة → إيقاف -->
  <button id="btnPrepare" class="btn btn-pri">️ تجهيز وتنظيف النص</button>
  <button id="btnRead" class="btn btn-ok" style="display:none;">🔊 بدء القراءة</button>
  <button id="btnStop" class="btn btn-err" style="display:none;">️ إيقاف فوري</button>
  
  <div id="out"></div>
</div>

<div id="log">جاهز...</div>

<script>
// === الحالة ===
let isReading = false;
let currentIdx = 0;
let lines = [];
// === عناصر DOM ===
const elInput = document.getElementById('input');
const elOut = document.getElementById('out');
const btnPrepare = document.getElementById('btnPrepare');
const btnRead = document.getElementById('btnRead');
const btnStop = document.getElementById('btnStop');
const elLog = document.getElementById('log');
const elToast = document.getElementById('toast');

function log(msg) { elLog.textContent = msg + '\n' + elLog.textContent; }
function toast(msg, type='ok') {
  elToast.textContent = msg;
  elToast.style.background = type==='err' ? 'var(--err)' : 'var(--ok)';
  elToast.style.display = 'block';
  setTimeout(() => elToast.style.display = 'none', 3000);
}

// === الفلتر النووي ===
function cleanText(raw) {
  if (!raw) return '';
  let t = raw.replace(/https?:\/\/\S+/gi, '').replace(/<[^>]*>/g, '');
  t = t.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF0-9\s\.\,\!\?\:\;\-\(\)\'\"؟،؛]/g, '');
  t = t.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u2069\uFEFF\u00AD\u061C\uFE0E\uFE0F]/g, '');
  return t.replace(/\s+/g, ' ').trim();
}

// === 1. زر التجهيز ===
btnPrepare.addEventListener('click', () => {
  const raw = elInput.value;
  if (!raw.trim()) { toast('⚠️ المربع فارغ', 'err'); return; }
  
  const text = cleanText(raw);
  if (text.length < 3) { toast('️ النص فارغ بعد التنظيف', 'err'); return; }
  
  lines = text.split(/[\n\.!؟؛]+/).map(s => s.trim()).filter(s => s.length > 2);
  elOut.innerHTML = '';
  lines.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'line'; div.id = 'l' + i; div.textContent = s;
    elOut.appendChild(div);
  });
  
  log(`✅ تم تجهيز ${lines.length} سطر نظيف.`);
  toast('✅ جاهز للقراءة');
  
  // تبديل الأزرار خطياً
  btnPrepare.style.display = 'none';
  btnRead.style.display = 'block';
  btnStop.style.display = 'none';
});
// === 2. زر القراءة ===
btnRead.addEventListener('click', () => {
  if (lines.length === 0) return;
  isReading = true;
  currentIdx = 0;
  
  btnRead.style.display = 'none';
  btnStop.style.display = 'block';
  log('🟢 بدأت القراءة...');
  speakLine(0);
});

// === محرك النطق ===
function speakLine(idx) {
  if (!isReading || idx >= lines.length) { stopReading(); return; }
  
  // تمييز بصري
  document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
  const cur = document.getElementById('l' + idx);
  if (cur) { cur.classList.add('active'); cur.scrollIntoView({behavior:'smooth', block:'center'}); }
  
  const text = lines[idx];
  log(`🗣️ السطر ${idx+1}/${lines.length}`);
  
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA';
  utter.rate = 0.85;
  
  const voices = window.speechSynthesis.getVoices();
  const ar = voices.find(v => v.lang.startsWith('ar'));
  if (ar) utter.voice = ar;
  
  utter.onend = () => { if (isReading) { currentIdx++; setTimeout(() => speakLine(currentIdx), 150); } };
  utter.onerror = (e) => {
    log(`❌ تخطي السطر ${idx+1} (${e.error})`);
    if (isReading) { currentIdx++; setTimeout(() => speakLine(currentIdx), 200); }
  };
  
  try { window.speechSynthesis.speak(utter); } 
  catch(err) { log(`💥 خطأ: ${err.message}`); stopReading(); }
}

// === 3. زر الإيقاف ===
function stopReading() {
  isReading = false;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
    btnRead.style.display = 'block';
  btnStop.style.display = 'none';
  log('️ تم الإيقاف');
}
btnStop.addEventListener('click', stopReading);

// === استقبال المشاركة ===
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  let raw = params.get('text') || params.get('share') || params.get('title') || '';
  
  if (raw) {
    try { raw = decodeURIComponent(raw.replace(/\+/g, ' ')); } catch(e){}
    elInput.value = cleanText(raw); // تنظيف فوري آمن
    toast(' تم استلام النص. اضغط "تجهيز"');
    log('📥 نص مستلم ومنظف.');
  }
  
  // تحميل الأصوات مسبقاً
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => log('🔊 الأصوات جاهزة');
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>

</body>
</html>
