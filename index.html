<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReadAid Neural</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0e141b;
color:#fff;
height:100vh;
overflow:hidden;
}

header{
padding:14px;
text-align:center;
background:#111827;
font-size:20px;
font-weight:700;
}

#pasteBox{
width:100%;
height:110px;
padding:12px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

#readerContainer{
height:calc(100vh - 250px);
overflow-y:auto;
padding:15px;
font-size:30px;
line-height:2.4;
font-weight:700;
}

.line{
padding:14px;
margin-bottom:10px;
background:#1b2430;
border-radius:12px;
transition:.2s;
}

.activeLine{
background:#1565c0;
transform:scale(1.02);
}

.controls{
position:fixed;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:10px;
background:#111827;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
font-weight:700;
}

button:active{transform:scale(.96);}
</style>
</head>

<body>

<header>ReadAid Neural — محرك القراءة الذكي</header>

<textarea id="pasteBox" placeholder="الصق النص هنا..."></textarea>

<div id="readerContainer"></div>

<div class="controls">
<button onclick="prepareText()">تحويل النص</button>
<button onclick="toggleRead()">تشغيل / إيقاف</button>
</div>

<script>
const readerContainer = document.getElementById("readerContainer");
const pasteBox = document.getElementById("pasteBox");

let reading = false;
let index = 0;

/* =========================
   1. تنظيف صارم للنص
========================= */
function cleanText(text){
return text
// الإيموجي
.replace(/[\p{Extended_Pictographic}]/gu, "")
// رموز وتحكم Unicode مخفي
.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g, "")
// التشكيل العربي
.replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, "")
// أي شيء ليس حرف/رقم/عربي/مسافة
.replace(/[^\p{L}\p{N}\u0600-\u06FF\s]/gu, "")
// روابط
.replace(/https?:\/\/\S+/g, "")
// مسافات زائدة
.replace(/\s+/g, " ")
.trim();
}

/* =========================
   2. تقسيم ذكي للجمل العربية
========================= */
function splitSentences(text){

text = cleanText(text);

// تقسيم أقوى من السابق
return text
.split(/(?<=[\.!\?؟])\s+|\n+|،/)
.map(s => s.trim())
.filter(s => s.length > 1);
}

/* =========================
   3. تجهيز النص للعرض
========================= */
function prepareText(){

const raw = pasteBox.value;
const sentences = splitSentences(raw);

readerContainer.innerHTML = "";

sentences.forEach((s,i)=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = cleanText(s);
div.dataset.index = i;
readerContainer.appendChild(div);
});
}

/* =========================
   4. تشغيل القراءة الصوتية
========================= */
function toggleRead(){

if(reading){
speechSynthesis.cancel();
reading = false;
index = 0;
return;
}

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading = true;
index = 0;

function speakNext(){

if(!reading) return;

if(index >= lines.length){
reading = false;
return;
}

lines.forEach(l=>l.classList.remove("activeLine"));
lines[index].classList.add("activeLine");

lines[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

/* تنظيف نهائي قبل النطق (طبقة أمان أخيرة) */
let textToSpeak = cleanText(lines[index].innerText);

/* إزالة أي شيء غير حروف/أرقام بشكل صارم */
textToSpeak = textToSpeak
.split("")
.filter(ch =>
/[\p{L}\p{N}\u0600-\u06FF\s]/u.test(ch)
)
.join("");

const utter = new SpeechSynthesisUtterance(textToSpeak);
utter.lang = "ar-SA";
utter.rate = 0.95;
utter.pitch = 1;

utter.onend = ()=>{
index++;
speakNext();
};

/* منع تداخل الأصوات */
speechSynthesis.cancel();
speechSynthesis.speak(utter);
}

speakNext();
}

/* =========================
   5. إدخال مباشر من الرابط
========================= */
window.addEventListener("DOMContentLoaded",()=>{
const params = new URLSearchParams(location.search);
const text = params.get("text");
if(text){
pasteBox.value = decodeURIComponent(text);
prepareText();
}
});
</script>

</body>
</html>
