<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReadAid</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1e88e5" />
<style>
body{
margin:0;
padding:0;
font-family:system-ui;
background:#101418;
color:#fff;
min-height:100vh;
overflow:hidden;
}
header{
padding:15px;
text-align:center;
background:#111827;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.4);
}
#readerContainer{
height:calc(100vh - 170px);
overflow-y:auto;
padding:20px;
line-height:2.4;
font-size:32px;
font-weight:700;
}
.line{
padding:20px;
margin-bottom:14px;
border-radius:16px;
background:#1b2430;
transition:.3s;
}
.activeLine{
background:#1565c0;
transform:scale(1.02);
}
.controls{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111827;
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.5);
}
button{
padding:18px;
font-size:20px;
border:none;
border-radius:14px;
background:#1e88e5;
color:#fff;
font-weight:bold;
}
button:active{
transform:scale(.97);
}
#pasteBox{
width:100%;
height:120px;
font-size:22px;
padding:15px;
box-sizing:border-box;
border:none;
outline:none;
background:#222;
color:#fff;
}
.hidden{
display:none;
}
.focusMode .line{
opacity:.15;
}
.focusMode .activeLine{
opacity:1;
font-size:40px;
background:#0d47a1;
}
/* عنصر مخفي تماماً مخصص للقراءة الصوتية فقط */
#speechHiddenContainer {
position: absolute;
left: -9999px;
top: -9999px;
width: 1px;
height: 1px;
overflow: hidden;
speak: none; /* حظر القراءة التلقائية من المتصفح */
}
</style>
</head>
<body>
<header>
ReadAid — وضع الراحة البصرية
</header>
<textarea id="pasteBox" placeholder="الصق النص هنا أو شاركه إلى التطبيق..."></textarea>
<div id="readerContainer"></div>
<div id="speechHiddenContainer" aria-hidden="true"></div>

<div class="controls">
<button onclick="prepareText()">تحويل النص</button>
<button onclick="toggleRead()">قراءة صوتية</button>
<button onclick="increaseFont()">تكبير</button>
<button onclick="decreaseFont()">تصغير</button>
<button onclick="toggleFocusMode()">وضع التركيز</button>
<button onclick="autoScroll()">تمرير تلقائي</button>
</div>
<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}
const readerContainer = document.getElementById('readerContainer');
const pasteBox = document.getElementById('pasteBox');
const speechHiddenContainer = document.getElementById('speechHiddenContainer');
let currentFont = 32;
let reading = false;
let autoScrolling = false;
let currentUtterance = null;

function prepareText(){
const text = pasteBox.value.trim();
if(!text) return;
readerContainer.innerHTML = '';
const sentences = text.match(/[^\.\!\؟\n]+[\.\!\؟]?/g);
sentences.forEach((sentence,index)=>{
const div = document.createElement('div');
div.className='line';
div.innerText=sentence;
div.dataset.index=index;
readerContainer.appendChild(div);
});
}

// دالة صارمة جداً لتنظيف النص وتحويله إلى أحرف خام فقط
function cleanTextStrict(text) {
if (!text) return '';
// مصفوفة للاحتفاظ بالأحرف الصالحة فقط
let cleanArray = [];
for (let i = 0; i < text.length; i++) {
let code = text.charCodeAt(i);
let char = text.charAt(i);

// السماح بالأحرف العربية وعلامات التشكيل
if (code >= 0x0600 && code <= 0x06FF) { cleanArray.push(char); continue; }
if (code >= 0x0750 && code <= 0x077F) { cleanArray.push(char); continue; }
if (code >= 0xFB50 && code <= 0xFDFF) { cleanArray.push(char); continue; }
if (code >= 0xFE70 && code <= 0xFEFF) { cleanArray.push(char); continue; }

// السماح بالأحرف الإنجليزية (كبيرة وصغيرة)
if (code >= 65 && code <= 90) { cleanArray.push(char); continue; }
if (code >= 97 && code <= 122) { cleanArray.push(char); continue; }

// السماح بالأرقام والمسافات وعلامات التوقف الأساسية التي تعطي وضوحاً للنطق
if ((code >= 48 && code <= 57) || char === ' ' || char === '.' || char === '،' || char === '؟' || char === '!' || char === '?') {
cleanArray.push(char);
}
}
// ربط الأحرف وتنظيف المسافات المزدوجة
return cleanArray.join('').replace(/\s+/g, ' ').trim();
}

function toggleRead(){
if(reading){
speechSynthesis.cancel();
reading=false;
return;
}
const lines = document.querySelectorAll('.line');
if(!lines.length) return;
reading=true;
let index=0;

function readNext(){
if(index>=lines.length){
reading=false;
return;
}
lines.forEach(l=>l.classList.remove('activeLine'));
lines[index].classList.add('activeLine');
lines[index].scrollIntoView({behavior:'smooth',block:'center'});

// 1. تنظيف النص برمجياً عبر فحص الأكواد الرقمية للأحرف (Strict Code Filtering)
const cleanText = cleanTextStrict(lines[index].innerText);

// إذا أصبح السطر فارغاً تماماً بعد الفلترة الصارمة، نتخطاه فوراً
if (!cleanText || cleanText.length === 0) {
index++;
if(reading) readNext();
return;
}

// 2. تدمير أي عملية نطق سابقة كلياً لضمان عدم التداخل
speechSynthesis.cancel();

// 3. حقن النص الصافي داخل العنصر المخفي وعزل المحرك الصوتي ليقرأ منه فقط
speechHiddenContainer.innerText = cleanText;

currentUtterance = new SpeechSynthesisUtterance(speechHiddenContainer.innerText);
currentUtterance.lang='ar-SA';
currentUtterance.rate=.9;

currentUtterance.onend=()=>{
index++;
if(reading) readNext();
};

currentUtterance.onerror=(e)=>{
console.log("Speech error, moving next...", e);
index++;
if(reading) readNext();
};

// تشغيل القراءة للنص المعزول والمحمي
speechSynthesis.speak(currentUtterance);
}
readNext();
}

function increaseFont(){
currentFont += 4;
readerContainer.style.fontSize=currentFont+'px';
}
function decreaseFont(){
currentFont -= 4;
if(currentFont<20) currentFont=20;
readerContainer.style.fontSize=currentFont+'px';
}
function toggleFocusMode(){
document.body.classList.toggle('focusMode');
}
function autoScroll(){
if(autoScrolling){
autoScrolling=false;
return;
}
autoScrolling=true;
const interval = setInterval(()=>{
if(!autoScrolling){
clearInterval(interval);
return;
}
readerContainer.scrollBy({top:1,behavior:'smooth'});
},40);
}
window.addEventListener('DOMContentLoaded',()=>{
const params = new URLSearchParams(window.location.search);
const sharedText = params.get('text');
if(sharedText){
pasteBox.value = sharedText;
prepareText();
}
});
</script>
</body>
</html>
