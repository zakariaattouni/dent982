<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ReadAid</title>

<!-- إعدادات التثبيت والأيقونة PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ReadAid">

<style>
:root {
  --bg-main: #0b1220;
  --bg-card: #1b2430;
  --primary: #1e88e5;
  --accent: #0d47a1;
}

body {
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg-main);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 16px;
  text-align: center;
  background: #111827;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

.container {
  padding: 15px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 90px;
}
textarea {
  width: 100%;
  height: 140px;
  padding: 15px;
  font-size: 18px;
  border: 2px solid #2a3746;
  border-radius: 14px;
  outline: none;
  background: var(--bg-card);
  color: #fff;
  box-sizing: border-box;
  resize: none;
  transition: border-color 0.3s;
}

textarea:focus {
  border-color: var(--primary);
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 16px;
  font-size: 18px;
  font-weight: 900;
  border: none;
  border-radius: 14px;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}

button:active {
  transform: scale(0.97);
}

button.secondary {
  background: #2e7d32;
}

#out {
  margin-top: 10px;
}
.line {
  padding: 18px;
  margin-bottom: 12px;
  background: var(--bg-card);
  border-radius: 14px;
  font-size: 28px;
  line-height: 1.8;
  font-weight: 700;
  transition: all 0.3s ease;
  border-right: 5px solid transparent;
}

.line.activeLine {
  background: var(--accent);
  border-right-color: var(--primary);
  transform: scale(1.02);
  box-shadow: 0 4px 15px rgba(0,0,0,.4);
}

#fab {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 400px;
  padding: 16px;
  border-radius: 16px;
  background: #d32f2f;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  cursor: pointer;
  user-select: none;
  text-align: center;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { bottom: -70px; opacity: 0; }
  to { bottom: 20px; opacity: 1; }
}

/* رسالة تنبيه مؤقتة */
#toast {
  position: fixed;  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 15px 25px;
  border-radius: 12px;
  font-size: 18px;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  text-align: center;
  max-width: 80%;
}
#toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<header>ReadAid — مُعين القراءة البصرية والصوتية</header>

<div class="container">
  <textarea id="input" placeholder="الصق النص هنا أو سيتم استقباله تلقائياً عند مشاركته مع التطبيق..."></textarea>
  
  <div class="btn-group">
    <button onclick="prepare()">🛠️ معالجة وتجهيز</button>
    <button class="secondary" onclick="readAll()">🔊 بدء القراءة</button>
  </div>

  <div id="out"></div>
</div>

<div id="fab" onclick="stop()">⏹️ إيقاف القراءة الصوتية</div>
<div id="toast"></div>

<script>
// === إدارة الحالة ===
let reading = false;
let currentIndex = 0;
let linesElements = [];
let voiceReady = false;

// === تحميل الأصوات مسبقاً ===
function initVoices() {
  const voices = speechSynthesis.getVoices();  if (voices.length > 0) {
    voiceReady = true;
    console.log('✅ تم تحميل الأصوات:', voices.filter(v => v.lang.startsWith('ar')).length, 'أصوات عربية');
  }
}

window.addEventListener('load', initVoices);
if (speechSynthesis) {
  speechSynthesis.onvoiceschanged = initVoices;
}

// === الفلتر النهائي الشامل ===
function cleanTextForSpeech(text) {
  if (!text || typeof text !== 'string') return '';
  
  let t = text;
  
  // 1. حذف الروابط
  t = t.replace(/https?:\/\/\S+/gi, '');
  
  // 2. حذف كتل الإيموجي والرموز التصويرية
  t = t.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{1F1E6}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1F000}-\u{1F02F}\u{2300}-\u{23FF}\u{2B50}-\u{2B55}\u{231A}-\u{231B}\u{23E9}-\u{23F3}\u{23F8}-\u{23FA}]/gu, '');
  
  // 3. حذف الروابط الخفية وتشكيلات البشرة والمكونات المركبة
  t = t.replace(/[\u200D\u200B\uFE0E\uFE0F\u20E3\u{1F3FB}-\u{1F3FF}]/gu, '');
  
  // 4. حذف رموز التحكم والاتجاهات غير المرئية
  t = t.replace(/[\u0000-\u001F\u007F-\u009F\u200B-\u200F\u202A-\u202E\u2066-\u2069\u061C]/g, '');
  
  // 5. القائمة البيضاء الصارمة: عربي + أرقام + لاتيني + ترقيم أساسي
  t = t.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\sA-Za-z0-9\.,!؟\?؛:()'"''\-–—]/g, '');
  
  // 6. تنظيف المسافات والفراغات
  t = t.replace(/\s+/g, ' ').trim();
  
  return t;
}

// === تقسيم النص بذكاء ===
function splitIntoSentences(text) {
  if (!text.trim()) return [];
  return text
    .split(/[\n\.!\?؟،]+/)
    .map(s => s.trim())
    .filter(s => s.length > 2); // تجاهل الشظايا القصيرة
}

// === تجهيز الواجهة ===
function prepare() {
  const rawText = document.getElementById("input").value;  const sentences = splitIntoSentences(rawText);
  const outContainer = document.getElementById("out");
  
  outContainer.innerHTML = "";
  stop();

  if (sentences.length === 0) {
    outContainer.innerHTML = "<p style='text-align:center; color:#aaa; font-size:18px;'>الرجاء إدخال نص قابل للقراءة</p>";
    return;
  }

  sentences.forEach((sentence, idx) => {
    const div = document.createElement("div");
    div.className = "line";
    div.innerText = sentence;
    div.dataset.index = idx;
    div.onclick = () => {
      if (reading) stop();
      currentIndex = idx;
      startSpeaking();
    };
    outContainer.appendChild(div);
  });

  linesElements = document.querySelectorAll(".line");
}

// === بدء القراءة ===
function readAll() {
  if (!linesElements.length) prepare();
  if (!linesElements.length) return;
  
  stop();
  currentIndex = 0;
  startSpeaking();
}

// === محرك النطق الأساسي ===
function startSpeaking() {
  if (!reading || currentIndex >= linesElements.length) {
    stop();
    return;
  }

  const currentLine = linesElements[currentIndex];
  const originalText = currentLine.innerText;
  const cleanText = cleanTextForSpeech(originalText);

  // تجاوز الأسطر الفارغة أو غير الصالحة
  if (!cleanText || cleanText.length < 3) {    currentIndex++;
    setTimeout(startSpeaking, 100);
    return;
  }

  // تحديث الواجهة
  linesElements.forEach(el => el.classList.remove("activeLine"));
  currentLine.classList.add("activeLine");
  currentLine.scrollIntoView({ behavior: "smooth", block: "center" });

  // إعداد النطق
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = "ar-SA";
  utterance.rate = 0.85;
  utterance.pitch = 1;
  utterance.volume = 1;

  // اختيار صوت عربي إن وجد
  const voices = speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang.startsWith('ar') && v.localService) || voices.find(v => v.lang.startsWith('ar'));
  if (arVoice) utterance.voice = arVoice;

  // عند انتهاء السطر بنجاح
  utterance.onend = () => {
    if (reading) {
      currentIndex++;
      setTimeout(startSpeaking, 150); // تأخير بسيط لمنع تعارض المحرك
    }
  };

  // معالجة الأخطاء بذكاء
  utterance.onerror = (e) => {
    console.warn('️ خطأ نطق:', e.error, 'على:', cleanText.substring(0, 30));
    
    if (e.error === 'synthesis-failed' || e.error === 'interrupted') {
      // محاولة بديلة: تقسيم النص إلى شظايا قصيرة
      const words = cleanText.split(/\s+/);
      if (words.length > 4) {
        const mid = Math.floor(words.length / 2);
        const part1 = words.slice(0, mid).join(' ');
        const part2 = words.slice(mid).join(' ');
        
        const u1 = new SpeechSynthesisUtterance(part1);
        const u2 = new SpeechSynthesisUtterance(part2);
        u1.lang = u2.lang = utterance.lang;
        u1.rate = u2.rate = utterance.rate;
        u1.voice = u2.voice = utterance.voice;

        u1.onend = () => {
          if (reading) speechSynthesis.speak(u2);        };
        u2.onend = () => {
          if (reading) {
            currentIndex++;
            setTimeout(startSpeaking, 150);
          }
        };
        u2.onerror = () => {
          currentIndex++;
          setTimeout(startSpeaking, 150);
        };

        speechSynthesis.cancel();
        setTimeout(() => speechSynthesis.speak(u1), 100);
        return;
      }
    }
    // تجاوز السطر في حال فشل غير قابل للإصلاح
    currentIndex++;
    setTimeout(startSpeaking, 150);
  };

  // تشغيل المحرك مع حماية من تعارض Chrome
  speechSynthesis.cancel();
  setTimeout(() => {
    if (reading) speechSynthesis.speak(utterance);
  }, 100);
}

// === إيقاف فوري ===
function stop() {
  reading = false;
  speechSynthesis.cancel();
  document.getElementById("fab").style.display = "none";
  if (linesElements.length) {
    linesElements.forEach(el => el.classList.remove("activeLine"));
  }
}

// === استقبال النصوص المشتركة ===
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const sharedText = params.get("text") || params.get("title");
  if (sharedText) {
    document.getElementById("input").value = decodeURIComponent(sharedText);
    prepare();
    setTimeout(readAll, 800);
  }
});
// عرض تنبيه بسيط (اختياري)
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// تسجيل السيرفس وركر
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
