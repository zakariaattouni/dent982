<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ReadAid - اقرأ بدون رموز</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e88e5">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #111827;
      padding: 16px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-radius: 40px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #1b2430;
      border: 2px solid #2a3746;
      border-radius: 28px;
      padding: 18px;
      font-size: 20px;
      line-height: 1.6;
      color: white;
      resize: vertical;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .read-btn {
      background: #2e7d32;
      border: none;
      width: 100%;
      padding: 24px;
      font-size: 36px;
      font-weight: bold;      border-radius: 80px;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 0 #1b5e20;
      transition: 0.05s linear;
      text-align: center;
      margin-bottom: 12px;
    }
    .read-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #1b5e20;
    }
    .stop-btn {
      background: #d32f2f;
      border: none;
      width: 100%;
      padding: 18px;
      font-size: 28px;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      display: none;
      margin-bottom: 12px;
    }
    .status {
      background: #00000099;
      border-radius: 40px;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      margin-top: 10px;
    }
    .info {
      font-size: 14px;
      text-align: center;
      color: #aaa;
      margin-top: 20px;
    }
    /* تأثير وميض بسيط عند التنظيف */
    .cleaning {
      animation: pulse 0.3s ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
<div class="header">🔊 ReadAid</div><textarea id="textInput" placeholder="سيظهر النص المشارك هنا تلقائياً... أو اكتب/الصق النص يدوياً"></textarea>
<button id="readBtn" class="read-btn">🔊 اقرأ النص</button>
<button id="stopBtn" class="stop-btn">⏹️ إيقاف القراءة</button>
<div id="status" class="status">✅ اضغط الزر لقراءة النص (يتم إزالة الإيموجي والرموز تلقائياً)</div>
<div class="info">✏️ يمكنك تعديل النص قبل القراءة. التطبيق يزيل كل الرموز ❤️ $ 🩸 تلقائياً.</div>

<script>
  const textarea = document.getElementById('textInput');
  const readBtn = document.getElementById('readBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusDiv = document.getElementById('status');
  let isReading = false;
  let currentUtterance = null;

  // 🎯 الدالة المحسنة: تنظيف النص للإلقاء الصوتي
  function cleanTextForSpeech(text) {
    if (!text) return '';
    
    // 1. إزالة الروابط (قبل أي معالجة أخرى)
    let cleaned = text.replace(/https?:\/\/\S+/gi, '')
                      .replace(/www\.\S+/gi, '');
    
    // 2. الفلتر الذكي: نحتفظ فقط بالأحرف والأرقام وعلامات الترقيم المفيدة
    // ⚠️ حرف 'u' في النهاية ضروري جداً للتعامل الصحيح مع الإيموجي (Unicode code points)
    // النطاقات:
    // \u0600-\u06FF : العربية الأساسية
    // \u0750-\u077F : العربية الممتدة (لللهجات)
    // \u08A0-\u08FF : العربية الإضافية
    // \uFB50-\uFDCF\uFDF0-\uFDFF\uFE70-\uFEFF : أشكال العرض العربية
    // a-zA-Z0-9 : الإنجليزية والأرقام
    // \s\.,!?؟،؛:;\-\(\)'" : علامات الترقيم المدعومة
    cleaned = cleaned.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDCF\uFDF0-\uFDFF\uFE70-\uFEFFa-zA-Z0-9\s\.,!?؟،؛:;\-\(\)'""]/gu, '');
    
    // 3. توحيد المسافات وإزالة الزوائد
    cleaned = cleaned.replace(/\s+/g, ' ').trim();
    
    return cleaned;
  }

  function showStatus(msg, isError = false) {
    statusDiv.innerText = msg;
    statusDiv.style.background = isError ? "#a22" : "#00000099";
    statusDiv.classList.remove('cleaning');
    void statusDiv.offsetWidth; // إعادة تعيين الأنيميشن
    statusDiv.classList.add('cleaning');
    setTimeout(() => {
      if (statusDiv.innerText === msg) {
        statusDiv.style.background = "#00000099";
        statusDiv.classList.remove('cleaning');
      }    }, 3000);
  }

  function stopReading() {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    isReading = false;
    stopBtn.style.display = 'none';
    readBtn.style.display = 'block';
    showStatus("⏹️ توقفت القراءة");
  }

  function startReading() {
    const rawText = textarea.value;
    if (!rawText.trim()) {
      showStatus("⚠️ لا يوجد نص. أرسل نصاً أو اكتبه أولاً.", true);
      return;
    }
    
    // مؤشر تنظيف النص
    showStatus("🧹 جاري تنظيف النص من الرموز...");
    
    setTimeout(() => {
      const clean = cleanTextForSpeech(rawText);
      
      if (!clean) {
        showStatus("❌ بعد إزالة الرموز لم يبقَ نص صالح. تأكد من وجود أحرف عربية أو إنجليزية.", true);
        return;
      }
      
      // عرض معاينة سريعة للنص المنظف (اختياري - يمكن إزالته)
      console.log("📝 النص الأصلي:", rawText.substring(0, 100) + "...");
      console.log("✨ النص المنظف:", clean.substring(0, 100) + "...");
      
      stopReading(); // إيقاف أي قراءة سابقة
      
      currentUtterance = new SpeechSynthesisUtterance(clean);
      currentUtterance.lang = "ar-SA";
      currentUtterance.rate = 0.85;
      currentUtterance.pitch = 1.0;
      
      currentUtterance.onstart = () => {
        isReading = true;
        stopBtn.style.display = 'block';
        readBtn.style.display = 'none';
        showStatus("🔊 جارٍ القراءة: " + clean.substring(0, 30) + "...");
      };
      
      currentUtterance.onend = () => {        isReading = false;
        stopBtn.style.display = 'none';
        readBtn.style.display = 'block';
        showStatus("✅ انتهت القراءة");
      };
      
      currentUtterance.onerror = (e) => {
        isReading = false;
        stopBtn.style.display = 'none';
        readBtn.style.display = 'block';
        console.error("❌ خطأ في النطق:", e);
        showStatus("⚠️ خطأ في النطق، حاول مرة أخرى", true);
      };
      
      speechSynthesis.speak(currentUtterance);
    }, 200); // تأخير بسيط لإظهار تأثير التنظيف
  }

  // استقبال النص من المشاركة (عبر ?text=...)
  function getSharedText() {
    const params = new URLSearchParams(window.location.search);
    let shared = params.get('text') || params.get('title');
    if (shared) {
      shared = decodeURIComponent(shared);
      textarea.value = shared;
      showStatus("📥 تم استلام النص. اضغط زر 'اقرأ النص'.");
      localStorage.setItem('readaid_last', shared);
    } else {
      // استعادة آخر نص إذا وجد
      const last = localStorage.getItem('readaid_last');
      if (last && !textarea.value.trim()) {
        textarea.value = last;
        showStatus("📄 آخر نص مستخدم. يمكنك تعديله ثم القراءة.");
      }
    }
  }

  // أزرار التحكم
  readBtn.onclick = startReading;
  stopBtn.onclick = stopReading;

  // حفظ النص عند تغييره يدوياً
  textarea.addEventListener('input', () => {
    localStorage.setItem('readaid_last', textarea.value);
  });

  // دعم اختصار لوحة المفاتيح
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();      isReading ? stopReading() : startReading();
    }
    if (e.key === 'Escape' && isReading) {
      stopReading();
    }
  });

  // التأكد من دعم المتصفح لـ SpeechSynthesis
  window.addEventListener('load', () => {
    getSharedText();
    if (!('speechSynthesis' in window)) {
      showStatus("⚠️ متصفحك لا يدعم القراءة الصوتية. جرب Chrome أو Edge.", true);
      readBtn.disabled = true;
      readBtn.style.opacity = "0.5";
    }
  });
</script>
</body>
</html>
