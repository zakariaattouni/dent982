<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ReadAid - تنظيف تام للإيموجي والرموز</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ReadAid">
<style>
:root {
  --bg-main: #0b1220;
  --bg-card: #1b2430;
  --primary: #1e88e5;
  --accent: #0d47a1;
}

body {
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg-main);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 16px;
  text-align: center;
  background: #111827;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

.container {
  padding: 15px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 90px;
}

textarea {
  width: 100%;
  height: 140px;
  padding: 15px;
  font-size: 18px;
  border: 2px solid #2a3746;
  border-radius: 14px;
  outline: none;
  background: var(--bg-card);
  color: #fff;
  box-sizing: border-box;
  resize: none;
  transition: border-color 0.3s;
}

textarea:focus {
  border-color: var(--primary);
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 16px;
  font-size: 18px;
  font-weight: 900;
  border: none;
  border-radius: 14px;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}

button:active {
  transform: scale(0.97);
}

button.secondary {
  background: #2e7d32;
}

.line {
  padding: 18px;
  margin-bottom: 12px;
  background: var(--bg-card);
  border-radius: 14px;
  font-size: 28px;
  line-height: 1.8;
  font-weight: 700;
  transition: all 0.3s ease;
  border-right: 5px solid transparent;
}

.line.activeLine {
  background: var(--accent);
  border-right-color: var(--primary);
  transform: scale(1.02);
  box-shadow: 0 4px 15px rgba(0,0,0,.4);
}

#fab {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 400px;
  padding: 16px;
  border-radius: 16px;
  background: #d32f2f;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  cursor: pointer;
  user-select: none;
  text-align: center;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { bottom: -70px; opacity: 0; }
  to { bottom: 20px; opacity: 1; }
}
</style>
</head>
<body>

<header>ReadAid — تنظيف الإيموجي والرموز تلقائياً</header>

<div class="container">
  <textarea id="input" placeholder="الصق النص هنا (سيتم حذف الإيموجي والرموز أثناء القراءة فقط)"></textarea>
  <div class="btn-group">
    <button onclick="prepare()">🛠️ معالجة وتجهيز</button>
    <button class="secondary" onclick="readAll()">🔊 بدء القراءة</button>
  </div>
  <div id="out"></div>
</div>

<div id="fab" onclick="stop()">⏹️ إيقاف القراءة الصوتية</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

let reading = false;
let currentIndex = 0;
let linesElements = [];

/* ========== الدالة السحرية التي تتجاهل كل الرموز والإيموجي ========== */
function cleanTextForSpeech(text) {
  if (!text) return '';

  // 1. إزالة الروابط
  let cleaned = text.replace(/https?:\/\/\S+/gi, '')
                    .replace(/www\.\S+/gi, '');

  // 2. إزالة الإيموجي والرموز التصويرية (يدعم كل الإيموجي الحديثة)
  //    \p{Extended_Pictographic} تشمل كل الرموز التعبيرية والصورية
  cleaned = cleaned.replace(/\p{Extended_Pictographic}/gu, '');

  // 3. إزالة أي رمز ليس من الفئات التالية:
  //    - الحروف العربية (بما فيها التشكيل الكامل والعلامات)
  //    - الحروف اللاتينية
  //    - الأرقام
  //    - المسافات
  //    - علامات الترقيم الأساسية: . , ! ? ؟ ، ؛
  //    هذا يزيل بقايا الرموز مثل ★ ♫ ♥ • ✓ § @ # $ % ^ & * ( ) [ ] { } \ | / ~ ` etc.
  cleaned = cleaned.replace(/[^\p{Arabic}\p{Latin}\d\s\.,!?؟،؛]/gu, '');

  // 4. تنظيف المسافات الزائدة
  cleaned = cleaned.replace(/\s+/g, ' ').trim();

  return cleaned;
}
/* =============================================================== */

function splitIntoSentences(text) {
  if (!text.trim()) return [];
  // تقسيم حسب نهايات الجمل المنطقية
  return text.split(/[\n\.!\?؟،]+/).map(s => s.trim()).filter(s => s.length > 1);
}

function prepare() {
  const rawText = document.getElementById("input").value;
  const sentences = splitIntoSentences(rawText);
  const outContainer = document.getElementById("out");
  outContainer.innerHTML = "";
  stop();

  if (sentences.length === 0) {
    outContainer.innerHTML = "<p style='text-align:center; color:#aaa; font-size:18px;'>الرجاء إدخال نص أولاً</p>";
    return;
  }

  sentences.forEach((sentence, idx) => {
    const div = document.createElement("div");
    div.className = "line";
    div.innerText = sentence;    // نعرض النص الأصلي (بالرموز) للوضوح
    div.dataset.index = idx;
    div.onclick = () => {
      if (reading) stop();
      currentIndex = idx;
      startSpeaking();
    };
    outContainer.appendChild(div);
  });
  linesElements = document.querySelectorAll(".line");
}

function readAll() {
  if (!linesElements.length) prepare();
  if (!linesElements.length) return;
  stop();
  currentIndex = 0;
  startSpeaking();
}

function startSpeaking() {
  if (currentIndex >= linesElements.length) {
    stop();
    return;
  }

  reading = true;
  document.getElementById("fab").style.display = "flex";

  linesElements.forEach(el => el.classList.remove("activeLine"));
  const currentLine = linesElements[currentIndex];
  currentLine.classList.add("activeLine");
  currentLine.scrollIntoView({ behavior: "smooth", block: "center" });

  // النص الأصلي قد يحتوي على إيموجي ورموز، لكن cleanTextForSpeech يزيلها بالكامل
  let rawSentence = currentLine.innerText;
  let cleanSentence = cleanTextForSpeech(rawSentence);

  // إذا أصبح السطر فارغاً بعد التنظيف، نتخطاه
  if (!cleanSentence) {
    currentIndex++;
    startSpeaking();
    return;
  }

  const utterance = new SpeechSynthesisUtterance(cleanSentence);
  utterance.lang = "ar-SA";
  utterance.rate = 0.82;  // سرعة هادئة

  utterance.onend = () => {
    if (reading) {
      currentIndex++;
      startSpeaking();
    }
  };

  utterance.onerror = () => {
    if (reading) {
      currentIndex++;
      startSpeaking();
    }
  };

  speechSynthesis.speak(utterance);
}

function stop() {
  reading = false;
  speechSynthesis.cancel();
  document.getElementById("fab").style.display = "none";
  if (linesElements.length) {
    linesElements.forEach(el => el.classList.remove("activeLine"));
  }
}

// استقبال النص المشترك من التطبيقات الأخرى
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const sharedText = params.get("text") || params.get("title");
  if (sharedText) {
    document.getElementById("input").value = decodeURIComponent(sharedText);
    prepare();
    setTimeout(readAll, 1000);
  }
});
</script>
</body>
</html>
