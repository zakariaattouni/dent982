<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAid - نسخة التشخيص</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 16px;
      line-height: 1.6;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; padding: 20px; background: #1e293b; border-radius: 16px; margin-bottom: 20px; }
    
    textarea {
      width: 100%;
      height: 150px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 14px;
      font-size: 18px;
      color: #fff;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    .btn {
      width: 100%;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.1s;
    }
    .btn-read { background: #22c55e; color: #fff; }
    .btn-read:active { transform: translateY(2px); }
    .btn-stop { background: #ef4444; color: #fff; display: none; }
    .btn-debug { background: #64748b; color: #fff; font-size: 16px; padding: 12px; border-radius: 12px; }
    
    .status {
      background: #1e293b;
      padding: 12px;      border-radius: 12px;
      text-align: center;
      margin: 10px 0;
      min-height: 24px;
    }
    
    .debug-panel {
      background: #0b1220;
      border-radius: 12px;
      padding: 14px;
      margin-top: 15px;
      display: none;
      font-family: monospace;
      font-size: 13px;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .debug-panel.show { display: block; }
    .debug-row { margin: 8px 0; padding: 8px; background: #1e293b; border-radius: 8px; }
    .debug-label { color: #94a3b8; }
    .debug-value { color: #22c55e; word-break: break-all; }
    .debug-value.empty { color: #ef4444; }
    
    .tip {
      background: #1e3a5f;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      margin-top: 20px;
      border-right: 4px solid #3b82f6;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔊 ReadAid - تشخيص</h1>
  
  <textarea id="txt" placeholder="📋 الصق النص هنا ثم اضغط 'اقرأ'"></textarea>
  
  <button id="btnRead" class="btn btn-read">🔊 اقرأ النص</button>
  <button id="btnStop" class="btn btn-stop">⏹️ إيقاف</button>
  <button id="btnDebug" class="btn btn-debug">🔍 عرض التشخيص</button>
  
  <div id="status" class="status">✅ جاهز</div>
  
  <div id="debug" class="debug-panel">
    <div class="debug-row">      <div class="debug-label">📥 النص الأصلي (الطول: <span id="lenRaw">0</span>):</div>
      <div id="raw" class="debug-value"></div>
    </div>
    <div class="debug-row">
      <div class="debug-label">✨ النص بعد التنظيف (الطول: <span id="lenClean">0</span>):</div>
      <div id="clean" class="debug-value"></div>
    </div>
    <div class="debug-row">
      <div class="debug-label">🔤 أحرف عربية موجودة:</div>
      <div id="arabicCheck" class="debug-value"></div>
    </div>
    <div class="debug-row">
      <div class="debug-label">⚙️ حالة الصوت:</div>
      <div id="speechCheck" class="debug-value"></div>
    </div>
  </div>
  
  <div class="tip">
    💡 <strong>ملاحظة مهمة:</strong> إذا لم يعمل الصوت، جرب الضغط على الزر مرتين، أو تأكد أن صوت الجهاز غير مكتوم.
  </div>
</div>

<script>
  const txt = document.getElementById('txt');
  const btnRead = document.getElementById('btnRead');
  const btnStop = document.getElementById('btnStop');
  const btnDebug = document.getElementById('btnDebug');
  const status = document.getElementById('status');
  const debug = document.getElementById('debug');
  
  // عناصر التشخيص
  const rawEl = document.getElementById('raw');
  const cleanEl = document.getElementById('clean');
  const lenRaw = document.getElementById('lenRaw');
  const lenClean = document.getElementById('lenClean');
  const arabicCheck = document.getElementById('arabicCheck');
  const speechCheck = document.getElementById('speechCheck');
  
  let utterance = null;
  let isReading = false;

  // ✅ دالة التنظيف البسيطة والموثوقة
  function cleanText(input) {
    if (!input) return '';
    
    // نحول النص إلى مصفوفة أحرف (للتعامل الصحيح مع الإيموجي)
    const chars = [...input];
    
    // نحتفظ فقط بالأحرف المسموحة
    const allowed = chars.filter(char => {      const code = char.codePointAt(0);
      // نسمح بـ:
      // - العربية: 0600-06FF
      // - اللاتينية: A-Z a-z
      // - الأرقام: 0-9
      // - المسافة وعلامات الترقيم الأساسية
      if (code >= 0x0600 && code <= 0x06FF) return true; // عربي
      if (/[a-zA-Z0-9\s\.,!?؟،؛:;\-\(\)'""]/u.test(char)) return true; // أساسي
      return false; // أي شيء آخر يُحذف
    });
    
    // نجمع الأحرف وننظف المسافات
    return allowed.join('').replace(/\s+/g, ' ').trim();
  }

  // 🔍 دالة التشخيص
  function runDiagnostics(text) {
    const cleaned = cleanText(text);
    
    rawEl.textContent = text || '(فارغ)';
    cleanEl.textContent = cleaned || '(فارغ - سيتم حذف كل النص!)';
    cleanEl.className = cleaned ? 'debug-value' : 'debug-value empty';
    
    lenRaw.textContent = text.length;
    lenClean.textContent = cleaned.length;
    
    // هل يوجد نص عربي؟
    const hasArabic = /[\u0600-\u06FF]/.test(text);
    arabicCheck.textContent = hasArabic ? '✅ نعم' : '❌ لا';
    arabicCheck.className = hasArabic ? 'debug-value' : 'debug-value empty';
    
    // حالة محرك الصوت
    const speechOK = 'speechSynthesis' in window;
    speechCheck.textContent = speechOK 
      ? `✅ مدعوم | الأصوات المتاحة: ${speechSynthesis.getVoices?.().length || 0}`
      : '❌ غير مدعوم في هذا المتصفح';
    speechCheck.className = speechOK ? 'debug-value' : 'debug-value empty';
    
    return cleaned;
  }

  function setStatus(msg, type = 'info') {
    status.textContent = msg;
    status.style.background = type === 'error' ? '#7f1d1d' : '#1e293b';
  }

  function stopSpeech() {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }    isReading = false;
    btnStop.style.display = 'none';
    btnRead.style.display = 'block';
    setStatus('⏹️ تم الإيقاف');
  }

  function startSpeech() {
    const input = txt.value;
    
    if (!input.trim()) {
      setStatus('⚠️ اكتب أو الصق نصاً أولاً', 'error');
      return;
    }
    
    // تشغيل التشخيص وعرضه إذا كان مفتوحاً
    const cleaned = runDiagnostics(input);
    if (debug.classList.contains('show')) {
      // التحديث تلقائي عند فتح التشخيص
    }
    
    // التحقق من النتيجة
    if (!cleaned) {
      setStatus('❌ النص بعد التنظيف فارغ! تأكد أن النص يحتوي أحرف عربية أو إنجليزية.', 'error');
      return;
    }
    
    // التحقق من دعم الصوت
    if (!('speechSynthesis' in window)) {
      setStatus('⚠️ متصفحك لا يدعم القراءة الصوتية', 'error');
      return;
    }
    
    // إيقاف أي قراءة سابقة
    stopSpeech();
    
    // إنشاء ونطق النص
    try {
      utterance = new SpeechSynthesisUtterance(cleaned);
      utterance.lang = 'ar-SA';
      utterance.rate = 0.9;
      
      utterance.onstart = () => {
        isReading = true;
        btnRead.style.display = 'none';
        btnStop.style.display = 'block';
        setStatus('🔊 جارٍ القراءة...');
      };
      
      utterance.onend = () => {
        isReading = false;        btnRead.style.display = 'block';
        btnStop.style.display = 'none';
        setStatus('✅ انتهت القراءة');
      };
      
      utterance.onerror = (e) => {
        isReading = false;
        btnRead.style.display = 'block';
        btnStop.style.display = 'none';
        console.error('Speech error:', e);
        setStatus('⚠️ خطأ في الصوت: ' + (e.error || 'غير معروف'), 'error');
      };
      
      speechSynthesis.speak(utterance);
      setStatus('🎧 بدء القراءة...');
      
    } catch (err) {
      console.error('Exception:', err);
      setStatus('❌ خطأ فني: ' + err.message, 'error');
    }
  }

  // الأزرار
  btnRead.onclick = startSpeech;
  btnStop.onclick = stopSpeech;
  
  btnDebug.onclick = () => {
    debug.classList.toggle('show');
    if (debug.classList.contains('show') && txt.value) {
      runDiagnostics(txt.value);
    }
  };
  
  // تحديث التشخيص عند الكتابة
  txt.addEventListener('input', () => {
    if (debug.classList.contains('show')) {
      runDiagnostics(txt.value);
    }
  });
  
  // تحميل الأصوات عند بدء الصفحة (مهم لـ Chrome)
  window.addEventListener('load', () => {
    if ('speechSynthesis' in window) {
      // تحميل قائمة الأصوات (قد يتطلب وقتاً في Chrome)
      speechSynthesis.onvoiceschanged = () => {
        console.log('🔊 الأصوات محملة:', speechSynthesis.getVoices().length);
      };
      // محاولة أولية لتحميل الأصوات
      speechSynthesis.getVoices();
    }    
    // استعادة آخر نص
    const saved = localStorage.getItem('readaid_text');
    if (saved) txt.value = saved;
  });
  
  // حفظ النص تلقائياً
  txt.addEventListener('change', () => {
    localStorage.setItem('readaid_text', txt.value);
  });
  
  // دعم اختصارات لوحة المفاتيح
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      isReading ? stopSpeech() : startSpeech();
    }
    if (e.key === 'Escape' && isReading) stopSpeech();
  });
</script>
</body>
</html>
