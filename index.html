<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReadAid Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f141a;
color:#fff;
height:100vh;
overflow:hidden;
}

header{
padding:14px;
text-align:center;
background:#111827;
font-size:20px;
font-weight:bold;
}

#pasteBox{
width:100%;
height:110px;
padding:12px;
font-size:18px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

#readerContainer{
height:calc(100vh - 250px);
overflow-y:auto;
padding:15px;
font-size:30px;
line-height:2.2;
font-weight:700;
}

.line{
padding:14px;
margin-bottom:10px;
background:#1b2430;
border-radius:12px;
transition:.2s;
}

.activeLine{
background:#1565c0;
transform:scale(1.02);
}

.controls{
position:fixed;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
background:#111827;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
font-weight:bold;
}

button:active{transform:scale(.96);}

.focusMode .line{opacity:.2;}
.focusMode .activeLine{
opacity:1;
font-size:38px;
background:#0d47a1;
}
</style>
</head>

<body>

<header>ReadAid Pro — قارئ ذكي</header>

<textarea id="pasteBox" placeholder="الصق النص هنا..."></textarea>

<div id="readerContainer"></div>

<div class="controls">
<button onclick="prepareText()">تحويل</button>
<button onclick="toggleRead()">تشغيل/إيقاف</button>
<button onclick="toggleFocusMode()">تركيز</button>
</div>

<script>
const readerContainer = document.getElementById("readerContainer");
const pasteBox = document.getElementById("pasteBox");

let reading = false;
let index = 0;

/* 🔥 تنظيف شامل للنص */
function cleanText(text){
return text
// إزالة الإيموجي الحقيقي
.replace(/[\p{Extended_Pictographic}]/gu, "")
// رموز عامة
.replace(/[\u2600-\u27BF]/gu, "")
// رموز زخرفية
.replace(/[*_~`•▪◆●■►◉]/g, "")
// روابط إن وجدت (اختياري)
.replace(/https?:\/\/\S+/g, "")
// مسافات زائدة
.replace(/\s+/g, " ")
.trim();
}

/* تحويل النص إلى جمل أدق */
function splitSentences(text){
return text
.split(/(?<=[\.!\?؟])\s+|\n+/)
.map(cleanText)
.filter(s => s.length > 1);
}

/* تجهيز النص */
function prepareText(){
const raw = pasteBox.value;
const clean = cleanText(raw);

const sentences = splitSentences(clean);

readerContainer.innerHTML = "";

sentences.forEach((s,i)=>{
const div = document.createElement("div");
div.className = "line";
div.innerText = s;
div.dataset.index = i;
readerContainer.appendChild(div);
});
}

/* تشغيل القراءة */
function toggleRead(){

if(reading){
speechSynthesis.cancel();
reading = false;
index = 0;
return;
}

const lines = document.querySelectorAll(".line");
if(!lines.length) return;

reading = true;
index = 0;

function readNext(){

if(!reading) return;

if(index >= lines.length){
reading = false;
return;
}

lines.forEach(l=>l.classList.remove("activeLine"));
lines[index].classList.add("activeLine");

lines[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

const textToSpeak = cleanText(lines[index].innerText);

const utter = new SpeechSynthesisUtterance(textToSpeak);
utter.lang = "ar-SA";
utter.rate = 0.95;
utter.pitch = 1;

utter.onend = ()=>{
index++;
readNext();
};

speechSynthesis.cancel(); // يمنع التداخل
speechSynthesis.speak(utter);
}

readNext();
}

/* وضع التركيز */
function toggleFocusMode(){
document.body.classList.toggle("focusMode");
}

/* إدخال تلقائي من رابط */
window.addEventListener("DOMContentLoaded",()=>{
const params = new URLSearchParams(location.search);
const text = params.get("text");
if(text){
pasteBox.value = decodeURIComponent(text);
prepareText();
}
});
</script>

</body>
</html>
